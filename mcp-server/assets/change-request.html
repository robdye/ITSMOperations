<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Request Detail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --fluent-bg-primary: #ffffff;
  --fluent-bg-secondary: #f5f5f5;
  --fluent-bg-tertiary: #fafafa;
  --fluent-bg-hover: #f0f0f0;
  --fluent-text-primary: #242424;
  --fluent-text-secondary: #616161;
  --fluent-text-tertiary: #9e9e9e;
  --fluent-border: #e0e0e0;
  --fluent-border-subtle: #f0f0f0;
  --fluent-brand-primary: #0f6cbd;
  --fluent-brand-hover: #115ea3;
  --fluent-brand-bg: #eff6fc;
  --fluent-success: #0e700e;
  --fluent-success-bg: #f1faf1;
  --fluent-warning: #bc4b09;
  --fluent-warning-bg: #fff9f5;
  --fluent-danger: #b10e1c;
  --fluent-danger-bg: #fdf3f4;
  --fluent-info: #0078d4;
  --fluent-info-bg: #f0f6ff;
  --fluent-overlay: rgba(0,0,0,0.4);
  --fluent-shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
  --fluent-shadow-md: 0 4px 8px rgba(0,0,0,0.08);
  --fluent-shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --fluent-radius-sm: 4px;
  --fluent-radius-md: 8px;
  --fluent-radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --fluent-bg-primary: #1f1f1f;
    --fluent-bg-secondary: #2d2d2d;
    --fluent-bg-tertiary: #383838;
    --fluent-bg-hover: #404040;
    --fluent-text-primary: #e0e0e0;
    --fluent-text-secondary: #ababab;
    --fluent-text-tertiary: #787878;
    --fluent-border: #404040;
    --fluent-border-subtle: #333333;
    --fluent-brand-primary: #479ef5;
    --fluent-brand-hover: #62abf5;
    --fluent-brand-bg: #082338;
    --fluent-success: #54b054;
    --fluent-success-bg: #052505;
    --fluent-warning: #f7a648;
    --fluent-warning-bg: #3d1d00;
    --fluent-danger: #e87979;
    --fluent-danger-bg: #3b0509;
    --fluent-info: #62abf5;
    --fluent-info-bg: #001d3a;
    --fluent-overlay: rgba(0,0,0,0.6);
    --fluent-shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
    --fluent-shadow-md: 0 4px 8px rgba(0,0,0,0.28);
    --fluent-shadow-lg: 0 8px 32px rgba(0,0,0,0.36);
  }
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fluent-bg-secondary);color:var(--fluent-text-primary);padding:20px;line-height:1.5}
.widget{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);border:1px solid var(--fluent-border);overflow:hidden;max-width:800px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-radius-md);background:var(--fluent-brand-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600;color:var(--fluent-text-primary)}
.widget-title p{font-size:12px;color:var(--fluent-text-secondary)}
.risk-banner{margin:16px 20px 0;padding:14px 16px;border-radius:var(--fluent-radius-md);display:flex;align-items:center;gap:12px}
.risk-low{background:var(--fluent-success-bg);border:1px solid var(--fluent-success)}.risk-med{background:var(--fluent-warning-bg);border:1px solid var(--fluent-warning)}.risk-high{background:var(--fluent-danger-bg);border:1px solid var(--fluent-danger)}.risk-crit{background:var(--fluent-danger-bg);border:1px solid var(--fluent-danger)}
.risk-score-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.risk-text h3{font-size:14px;font-weight:600}.risk-text p{font-size:12px;color:var(--fluent-text-secondary)}
.detail-body{padding:20px}
.section-label{font-size:12px;font-weight:600;color:var(--fluent-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--fluent-border-subtle)}
.section-label:first-child{margin-top:0;padding-top:0;border-top:none}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item{display:flex;flex-direction:column;gap:2px}
.detail-item .lbl{font-size:11px;color:var(--fluent-text-secondary);text-transform:uppercase;letter-spacing:0.3px}
.detail-item .val{font-size:13px;font-weight:500;color:var(--fluent-text-primary)}
.detail-full{grid-column:1/-1}
.state-tag{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sNew{background:var(--fluent-success-bg);color:var(--fluent-success)}.sAssess{background:var(--fluent-warning-bg);color:var(--fluent-warning)}.sImpl{background:var(--fluent-brand-bg);color:var(--fluent-brand-primary)}.sClosed{background:var(--fluent-bg-secondary);color:var(--fluent-text-secondary)}
.nist-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.nist-tag{background:var(--fluent-brand-bg);color:var(--fluent-brand-primary);padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.incidents-section{margin-top:16px}
.inc-mini{background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:var(--fluent-radius-md);padding:10px 12px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:border-color .15s}
.inc-mini:hover{border-color:var(--fluent-brand-primary)}
.inc-mini strong{color:var(--fluent-danger)}
.btn-open{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--fluent-radius-md);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--fluent-brand-primary);color:#fff;margin-top:16px;transition:background .15s}
.btn-open:hover{background:var(--fluent-brand-hover)}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);text-align:right;font-size:10px;color:var(--fluent-text-tertiary)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="widget-icon">📋</div>
    <div class="widget-title"><h2 id="cr-title">Change Request</h2><p id="cr-sub">ServiceNow · Change Detail</p></div>
  </div>
  <div id="risk-banner"></div>
  <div class="detail-body" id="detail-body"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var cr=to.changeRequest||{};var rs=to.riskScore||{};var eol=to.eolData||null;var incidents=to.incidents||[];
var si=to.snowInstance||'';
document.getElementById('cr-title').textContent=(cr.number||'Change Request')+' — '+(cr.short_description||'');
document.getElementById('cr-sub').textContent='ServiceNow · '+(cr.number||'');
var riskCls=rs.category==='Critical'?'risk-crit':rs.category==='High'?'risk-high':rs.category==='Medium'?'risk-med':'risk-low';
var scoreColor=rs.color||'#757575';
document.getElementById('risk-banner').innerHTML='<div class="risk-banner '+riskCls+'">'+
'<div class="risk-score-circle" style="background:'+scoreColor+'">'+(rs.score||0)+'</div>'+
'<div class="risk-text"><h3>'+(rs.category||'Low')+' Risk</h3><p>'+(rs.itilProcess||'')+'</p>'+
'<div class="nist-tags">'+(rs.nistControls||[]).map(function(c){return'<span class="nist-tag">'+c+'</span>';}).join('')+'</div></div></div>';
var st=(cr.state||'').toLowerCase();var stClass=st.includes('new')?'sNew':st.includes('assess')?'sAssess':st.includes('implement')?'sImpl':'sClosed';
var html='<div class="section-label">Change Details</div><div class="detail-grid">'+
'<div class="detail-item"><span class="lbl">State</span><span class="state-tag '+stClass+'">'+(cr.state||'—')+'</span></div>'+
'<div class="detail-item"><span class="lbl">Type</span><span class="val">'+(cr.type||'Normal')+'</span></div>'+
'<div class="detail-item"><span class="lbl">Priority</span><span class="val">'+(cr.priority||'—')+'</span></div>'+
'<div class="detail-item"><span class="lbl">Category</span><span class="val">'+(cr.category||'—')+'</span></div>'+
'<div class="detail-item"><span class="lbl">Assignment Group</span><span class="val">'+(cr.assignment_group||'—')+'</span></div>'+
'<div class="detail-item"><span class="lbl">Requested By</span><span class="val">'+(cr.requested_by||'—')+'</span></div>'+
'<div class="detail-item detail-full"><span class="lbl">Description</span><span class="val">'+(cr.description||cr.short_description||'—')+'</span></div></div>';
if(cr.cmdb_ci){html+='<div class="section-label">Affected Configuration Item</div><div class="detail-grid">'+
'<div class="detail-item"><span class="lbl">CI Name</span><span class="val">'+(typeof cr.cmdb_ci==='object'?(cr.cmdb_ci.display_value||''):cr.cmdb_ci)+'</span></div></div>';}
if(eol){html+='<div class="section-label">EOL Status</div><div class="detail-grid">'+
'<div class="detail-item"><span class="lbl">Product</span><span class="val">'+(eol.product||'—')+'</span></div>'+
'<div class="detail-item"><span class="lbl">Status</span><span class="val">'+(eol._riskClassification?eol._riskClassification.status:'—')+'</span></div></div>';}
if(incidents.length){html+='<div class="section-label">Active Incidents on this CI</div><div class="incidents-section">';
for(var i=0;i<incidents.length;i++){var inc=incidents[i];var iLink=si+'/nav_to.do?uri=incident.do?sys_id='+(inc.sys_id||'');
html+='<div class="inc-mini" onclick="window.open(\''+iLink+'\',\'_blank\')"><strong>'+inc.number+'</strong> — '+(inc.short_description||'')+' · '+(inc.priority||'')+'</div>';}
html+='</div>';}
var crLink=si+'/nav_to.do?uri=change_request.do?sys_id='+(cr.sys_id||'');
html+='<button class="btn-open" onclick="window.open(\''+crLink+'\',\'_blank\')">Open in ServiceNow →</button>';
document.getElementById('detail-body').innerHTML=html;
document.getElementById('footer').textContent='Generated '+new Date(to.generatedAt||'').toLocaleString('en-GB')+' · Data from ServiceNow';
</script>
</body></html>
