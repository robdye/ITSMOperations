<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FinOps Dashboard</title>
<style>
:root {
  --fluent-colorNeutralBackground1: #ffffff;
  --fluent-colorNeutralBackground2: #fafafa;
  --fluent-colorNeutralBackground3: #f5f5f5;
  --fluent-colorNeutralForeground1: #242424;
  --fluent-colorNeutralForeground2: #616161;
  --fluent-colorNeutralForeground3: #9e9e9e;
  --fluent-colorNeutralStroke1: #e0e0e0;
  --fluent-colorBrandBackground: #0f6cbd;
  --fluent-colorBrandForeground1: #0f6cbd;
  --fluent-colorPaletteRedBackground3: #c50f1f;
  --fluent-colorPaletteRedForeground1: #c50f1f;
  --fluent-colorPaletteGreenBackground3: #107c10;
  --fluent-colorPaletteGreenForeground1: #107c10;
  --fluent-colorPaletteYellowBackground3: #f7630c;
  --fluent-colorPaletteYellowForeground1: #f7630c;
  --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.12);
  --fluent-colorNeutralShadowKey: rgba(0,0,0,0.14);
  --fluent-borderRadiusMedium: 8px;
  --fluent-borderRadiusLarge: 12px;
  --fluent-fontFamilyBase: 'Segoe UI', -apple-system, system-ui, sans-serif;
  --fluent-fontSizeBase300: 14px;
  --fluent-fontSizeBase400: 16px;
  --fluent-fontSizeBase500: 20px;
  --fluent-fontSizeBase600: 24px;
  --fluent-fontWeightSemibold: 600;
  --fluent-spacingHorizontalM: 12px;
  --fluent-spacingHorizontalL: 16px;
  --fluent-spacingVerticalM: 12px;
  --fluent-spacingVerticalL: 16px;
  --fluent-shadow4: 0 2px 4px var(--fluent-colorNeutralShadowAmbient), 0 1px 2px var(--fluent-colorNeutralShadowKey);
  --fluent-shadow8: 0 4px 8px var(--fluent-colorNeutralShadowAmbient), 0 2px 4px var(--fluent-colorNeutralShadowKey);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fluent-colorNeutralBackground1: #1f1f1f;
    --fluent-colorNeutralBackground2: #292929;
    --fluent-colorNeutralBackground3: #333333;
    --fluent-colorNeutralForeground1: #ffffff;
    --fluent-colorNeutralForeground2: #d6d6d6;
    --fluent-colorNeutralForeground3: #adadad;
    --fluent-colorNeutralStroke1: #404040;
    --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.24);
    --fluent-colorNeutralShadowKey: rgba(0,0,0,0.28);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fluent-fontFamilyBase);background:var(--fluent-colorNeutralBackground3);color:var(--fluent-colorNeutralForeground1);padding:20px;line-height:1.5}
.widget{background:var(--fluent-colorNeutralBackground1);border-radius:var(--fluent-borderRadiusLarge);border:1px solid var(--fluent-colorNeutralStroke1);overflow:hidden;max-width:960px;margin:0 auto;box-shadow:var(--fluent-shadow8)}
.widget-header{display:flex;align-items:center;gap:10px;padding:var(--fluent-spacingVerticalL) 20px;border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-borderRadiusMedium);background:#e6f4e6;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:var(--fluent-fontSizeBase400);font-weight:var(--fluent-fontWeightSemibold)}
.widget-title p{font-size:12px;color:var(--fluent-colorNeutralForeground2)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--fluent-colorNeutralStroke1);border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.kpi{background:var(--fluent-colorNeutralBackground1);padding:var(--fluent-spacingVerticalL) var(--fluent-spacingHorizontalM);text-align:center}
.kpi .val{font-size:var(--fluent-fontSizeBase500);font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-colorNeutralForeground2);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.kpi .trend{font-size:12px;margin-top:4px}
.trend-up{color:var(--fluent-colorPaletteRedForeground1)}.trend-down{color:var(--fluent-colorPaletteGreenForeground1)}
.section{padding:20px}
.section-title{font-size:var(--fluent-fontSizeBase300);font-weight:var(--fluent-fontWeightSemibold);margin-bottom:var(--fluent-spacingVerticalM);color:var(--fluent-colorNeutralForeground2);text-transform:uppercase;letter-spacing:.3px}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{min-width:120px;font-size:13px;text-align:right;color:var(--fluent-colorNeutralForeground2)}
.bar-track{flex:1;height:28px;background:var(--fluent-colorNeutralBackground3);border-radius:var(--fluent-borderRadiusMedium);overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:var(--fluent-borderRadiusMedium);transition:width .6s ease;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:var(--fluent-fontWeightSemibold);color:#fff;white-space:nowrap}
.bar-fill.c0{background:var(--fluent-colorBrandBackground)}.bar-fill.c1{background:#2d7d9a}.bar-fill.c2{background:var(--fluent-colorPaletteYellowBackground3)}.bar-fill.c3{background:#8764b8}.bar-fill.c4{background:var(--fluent-colorPaletteGreenBackground3)}.bar-fill.c5{background:#ca5010}
.budget-section{padding:0 20px 20px}
.budget-bar{height:24px;background:var(--fluent-colorNeutralBackground3);border-radius:var(--fluent-borderRadiusMedium);overflow:hidden;position:relative;margin-top:8px}
.budget-fill{height:100%;border-radius:var(--fluent-borderRadiusMedium);transition:width .6s ease}
.budget-fill.ok{background:var(--fluent-colorPaletteGreenBackground3)}.budget-fill.warn{background:var(--fluent-colorPaletteYellowBackground3)}.budget-fill.over{background:var(--fluent-colorPaletteRedBackground3)}
.budget-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--fluent-colorNeutralForeground2);margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:var(--fluent-fontSizeBase300)}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:var(--fluent-fontWeightSemibold);text-transform:uppercase;letter-spacing:.3px;color:var(--fluent-colorNeutralForeground2);background:var(--fluent-colorNeutralBackground2);border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
td{padding:10px 14px;border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
tr:hover td{background:var(--fluent-colorNeutralBackground2)}
.savings{color:var(--fluent-colorPaletteGreenForeground1);font-weight:var(--fluent-fontWeightSemibold)}
.empty{text-align:center;color:var(--fluent-colorNeutralForeground3);padding:32px 20px;font-size:var(--fluent-fontSizeBase300)}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-colorNeutralStroke1);text-align:right;font-size:10px;color:var(--fluent-colorNeutralForeground3)}
</style>
</head>
<body>
<div class="widget" role="region" aria-label="FinOps Cost Analysis Dashboard">
  <div class="widget-header"><div class="widget-icon">💰</div><div class="widget-title"><h2>Azure FinOps Dashboard</h2><p>Cost Analysis &amp; Optimization</p></div></div>
  <div class="kpis" id="kpis" role="group" aria-label="Cost summary"></div>
  <div class="section" id="chart-section" aria-label="Cost breakdown by service"><div class="section-title">Cost by Service</div><div class="bar-chart" id="bar-chart" role="img" aria-label="Cost breakdown bar chart"></div></div>
  <div class="budget-section" id="budget-section" aria-label="Budget utilization"><div class="section-title">Budget Utilization</div><div class="budget-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="budget-bar"><div class="budget-fill" id="budget-fill"></div></div><div class="budget-meta" id="budget-meta"></div></div>
  <div class="section" id="recs-section"><div class="section-title">Optimization Recommendations</div><div id="recs-content"></div></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var costs=to.costs||{};
var recs=to.recommendations||[];

function fmt(n){if(n==null)return'—';return'$'+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// KPIs
var totalSpend=costs.totalSpend||costs.total||0;
var mom=costs.monthOverMonth||costs.mom||null;
var forecast=costs.forecast||null;
var savingsPotential=costs.savingsPotential||costs.savings||null;
var momTrend=mom!=null?(mom>=0?'trend-up':'trend-down'):'';
var momArrow=mom!=null?(mom>=0?'▲':'▼'):'';

document.getElementById('kpis').innerHTML=
  '<div class="kpi" tabindex="0"><div class="val">'+fmt(totalSpend)+'</div><div class="lbl">Total Spend</div></div>'+
  '<div class="kpi" tabindex="0"><div class="val">'+fmt(mom)+'</div><div class="lbl">Month-over-Month</div>'+(mom!=null?'<div class="trend '+momTrend+'">'+momArrow+' '+Math.abs(mom).toFixed(1)+'%</div>':'')+'</div>'+
  '<div class="kpi" tabindex="0"><div class="val">'+fmt(forecast)+'</div><div class="lbl">Forecast</div></div>'+
  '<div class="kpi" tabindex="0"><div class="val savings">'+fmt(savingsPotential)+'</div><div class="lbl">Savings Potential</div></div>';

// Bar chart
var breakdown=costs.byService||costs.breakdown||{};
var services=Object.keys(breakdown);
var maxCost=0;for(var i=0;i<services.length;i++){if(breakdown[services[i]]>maxCost)maxCost=breakdown[services[i]];}
var chartHtml='';
for(var i=0;i<services.length;i++){
  var pct=maxCost>0?Math.round((breakdown[services[i]]/maxCost)*100):0;
  chartHtml+='<div class="bar-row"><div class="bar-label">'+esc(services[i])+'</div><div class="bar-track"><div class="bar-fill c'+i%6+'" style="width:'+pct+'%" role="presentation">'+fmt(breakdown[services[i]])+'</div></div></div>';
}
if(services.length===0)chartHtml='<div class="empty">No cost data available.</div>';
document.getElementById('bar-chart').innerHTML=chartHtml;

// Budget
var budget=costs.budget||0;
var spent=totalSpend;
var budgetPct=budget>0?Math.min(Math.round((spent/budget)*100),100):0;
var budgetEl=document.getElementById('budget-fill');
budgetEl.style.width=budgetPct+'%';
budgetEl.className='budget-fill '+(budgetPct>=100?'over':budgetPct>=80?'warn':'ok');
document.getElementById('budget-bar').setAttribute('aria-valuenow',budgetPct);
document.getElementById('budget-meta').innerHTML='<span>'+fmt(spent)+' of '+fmt(budget)+' budget</span><span>'+budgetPct+'% utilized</span>';

// Recommendations
var recsHtml='';
if(recs.length>0){
  recsHtml='<table role="grid" aria-label="Optimization recommendations"><thead><tr><th scope="col">Resource</th><th scope="col">Current SKU</th><th scope="col">Recommended</th><th scope="col">Monthly Savings</th></tr></thead><tbody>';
  for(var i=0;i<recs.length;i++){
    var r=recs[i];
    recsHtml+='<tr tabindex="0"><td>'+esc(r.resource||r.name||'')+'</td><td>'+esc(r.currentSku||r.current||'')+'</td><td>'+esc(r.recommendedSku||r.recommended||'')+'</td><td class="savings">'+fmt(r.monthlySavings||r.savings)+'</td></tr>';
  }
  recsHtml+='</tbody></table>';
}else{recsHtml='<div class="empty">No optimization recommendations at this time.</div>';}
document.getElementById('recs-content').innerHTML=recsHtml;

document.getElementById('footer').textContent='Azure FinOps · '+new Date().toLocaleString();
</script>
</body>
</html>
