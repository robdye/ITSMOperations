<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EOL Risk Forecast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#242424;padding:20px;line-height:1.5}
.widget{background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #f0f0f0}
.widget-icon{width:36px;height:36px;border-radius:8px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600;color:#242424}
.widget-title p{font-size:12px;color:#616161}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#f0f0f0;border-bottom:1px solid #f0f0f0}
.kpi{background:#fff;padding:16px 12px;text-align:center}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:#616161;margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.asset-card{display:grid;grid-template-columns:4px 1fr auto;gap:0;background:#fafafa;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s}
.asset-card:hover{border-color:#1976d2;box-shadow:0 2px 8px rgba(25,118,210,.1)}
.status-bar{border-radius:0}
.asset-body{padding:12px;display:flex;flex-direction:column;gap:4px}
.asset-body h3{font-size:13px;font-weight:600;color:#242424}
.asset-body .meta{font-size:11px;color:#757575}
.asset-right{padding:12px 16px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px}
.status-tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.st-nc{background:#ffebee;color:#c62828}.st-ar{background:#fff3e0;color:#e65100}.st-ok{background:#e8f5e9;color:#2e7d32}
.days-label{font-size:11px;color:#757575}
.empty{text-align:center;color:#9e9e9e;padding:48px 20px;font-size:14px}
.footer{padding:10px 16px;border-top:1px solid #f0f0f0;text-align:right;font-size:10px;color:#bdbdbd}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="widget-icon">📅</div>
    <div class="widget-title"><h2>EOL Risk Forecast</h2><p id="sub">ServiceNow + EndOfLife.date</p></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="list" id="list"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var forecasts=to.forecasts||[];var months=to.months||12;
var nc=forecasts.filter(function(f){return f.eolStatus&&f.eolStatus.status==='non-compliant'}).length;
var ar=forecasts.filter(function(f){return f.eolStatus&&f.eolStatus.status==='at-risk'}).length;
var ok=forecasts.length-nc-ar;
document.getElementById('sub').textContent='ServiceNow + EndOfLife.date · '+months+' month forecast';
document.getElementById('kpis').innerHTML=
'<div class="kpi"><div class="val" style="color:#c62828">'+nc+'</div><div class="lbl">Non-Compliant</div></div>'+
'<div class="kpi"><div class="val" style="color:#e65100">'+ar+'</div><div class="lbl">At Risk</div></div>'+
'<div class="kpi"><div class="val" style="color:#2e7d32">'+ok+'</div><div class="lbl">Supported</div></div>';
var html='';
for(var i=0;i<forecasts.length;i++){var f=forecasts[i];
var status=f.eolStatus?f.eolStatus.status:'supported';
var barColor=status==='non-compliant'?'#ef5350':status==='at-risk'?'#ff9800':'#66bb6a';
var stCls=status==='non-compliant'?'st-nc':status==='at-risk'?'st-ar':'st-ok';
var stLabel=status==='non-compliant'?'Non-Compliant':status==='at-risk'?'At Risk':'Supported';
var days=f.daysToEol;var daysText=days===null||days===undefined?'—':days<0?Math.abs(days)+' days past EOL':days+' days to EOL';
html+='<div class="asset-card" role="button" tabindex="0">'+
'<div class="status-bar" style="background:'+barColor+'"></div>'+
'<div class="asset-body"><h3>'+(f.ci_name||'Unknown CI')+'</h3>'+
'<div class="meta">'+(f.os||'—')+' · '+(f.environment||'—')+'</div></div>'+
'<div class="asset-right"><span class="status-tag '+stCls+'">'+stLabel+'</span>'+
'<span class="days-label">'+daysText+'</span></div></div>';}
document.getElementById('list').innerHTML=html||'<div class="empty">No EOL data available.</div>';
document.getElementById('footer').textContent=forecasts.length+' asset'+(forecasts.length!==1?'s':'')+' analyzed · Data from ServiceNow + EndOfLife.date';
</script>
</body></html>
