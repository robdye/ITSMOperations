<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Risk Briefing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fluent-bg-primary:#ffffff;--fluent-bg-secondary:#f5f5f5;--fluent-bg-tertiary:#fafafa;--fluent-bg-hover:#f0f0f0;
  --fluent-text-primary:#242424;--fluent-text-secondary:#616161;--fluent-text-tertiary:#9e9e9e;
  --fluent-border:#e0e0e0;--fluent-border-subtle:#f0f0f0;
  --fluent-brand-primary:#0f6cbd;--fluent-brand-hover:#115ea3;--fluent-brand-bg:#eff6fc;
  --fluent-success:#0e700e;--fluent-success-bg:#f1faf1;--fluent-warning:#bc4b09;--fluent-warning-bg:#fff9f5;
  --fluent-danger:#b10e1c;--fluent-danger-bg:#fdf3f4;--fluent-info:#0078d4;--fluent-info-bg:#f0f6ff;
  --fluent-overlay:rgba(0,0,0,0.4);
  --fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.04);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.08);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --fluent-radius-sm:4px;--fluent-radius-md:8px;--fluent-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --fluent-bg-primary:#1f1f1f;--fluent-bg-secondary:#2d2d2d;--fluent-bg-tertiary:#383838;--fluent-bg-hover:#404040;
    --fluent-text-primary:#e0e0e0;--fluent-text-secondary:#ababab;--fluent-text-tertiary:#787878;
    --fluent-border:#404040;--fluent-border-subtle:#333333;
    --fluent-brand-primary:#479ef5;--fluent-brand-hover:#62abf5;--fluent-brand-bg:#082338;
    --fluent-success:#54b054;--fluent-success-bg:#052505;--fluent-warning:#f7a648;--fluent-warning-bg:#3d1d00;
    --fluent-danger:#e87979;--fluent-danger-bg:#3b0509;--fluent-info:#62abf5;--fluent-info-bg:#001d3a;
    --fluent-overlay:rgba(0,0,0,0.6);
    --fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.2);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.28);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.36);
  }
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fluent-bg-secondary);color:var(--fluent-text-primary);padding:20px;line-height:1.5}
.widget{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);border:1px solid var(--fluent-border);overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-radius-md);background:var(--fluent-warning-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600;color:var(--fluent-text-primary)}
.widget-title p{font-size:12px;color:var(--fluent-text-secondary)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--fluent-border-subtle);border-bottom:1px solid var(--fluent-border-subtle)}
.kpi{background:var(--fluent-bg-primary);padding:16px 12px;text-align:center}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.sections{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.section{background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:10px;padding:14px 16px}
.section h2{font-size:13px;font-weight:600;color:var(--fluent-text-primary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section h2 .ct{background:var(--fluent-border);color:var(--fluent-text-secondary);padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}
.alert{border:1px solid var(--fluent-border);border-radius:var(--fluent-radius-md);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;font-size:12px;background:var(--fluent-bg-primary)}
.alert:hover{border-color:var(--fluent-brand-primary);box-shadow:var(--fluent-shadow-sm)}
.alert:last-child{margin-bottom:0}
.alert strong{display:block;margin-bottom:2px;font-size:13px}
.alert p{color:var(--fluent-text-secondary);font-size:11px}
.collision-alert{border-left:3px solid var(--fluent-warning)}.collision-alert strong{color:var(--fluent-warning)}
.stale-alert{border-left:3px solid var(--fluent-text-tertiary)}.stale-alert strong{color:var(--fluent-text-secondary)}
.high-risk-alert{border-left:3px solid var(--fluent-danger)}.high-risk-alert strong{color:var(--fluent-danger)}
.incident-alert{border-left:3px solid var(--fluent-warning)}.incident-alert strong{color:var(--fluent-warning)}
.reco{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--fluent-border-subtle);align-items:flex-start;font-size:12px;color:var(--fluent-text-primary)}
.reco:last-child{border-bottom:none}
.reco-num{background:var(--fluent-brand-primary);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.reco-urgent .reco-num{background:var(--fluent-danger)}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);text-align:right;font-size:10px;color:var(--fluent-text-tertiary)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="widget-icon">⚠️</div>
    <div class="widget-title"><h2>Change Risk Briefing</h2><p id="ts">ServiceNow · Risk Analysis</p></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="sections" id="alerts"></div>
  <div class="section" style="margin:0 16px 12px;background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:10px;padding:14px 16px"><h2 style="font-size:13px;font-weight:600;margin-bottom:10px">Recommendations</h2><div id="recos"></div></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var d=to;var si=d.snowInstance||'';
var ts=d.generatedAt?new Date(d.generatedAt).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
document.getElementById('ts').textContent='ServiceNow · '+ts;
document.getElementById('kpis').innerHTML=
'<div class="kpi"><div class="val" style="color:#f57f17">'+(d.collisionCount||0)+'</div><div class="lbl">Collisions</div></div>'+
'<div class="kpi"><div class="val" style="color:#c62828">'+(d.highRiskCount||0)+'</div><div class="lbl">High Risk</div></div>'+
'<div class="kpi"><div class="val" style="color:#757575">'+(d.staleCount||0)+'</div><div class="lbl">Stale CRs</div></div>'+
'<div class="kpi"><div class="val" style="color:#e65100">'+(d.incidentRiskCount||0)+'</div><div class="lbl">Incident Risk</div></div>';
var html='';
var coll=d.collisions||[];
if(coll.length){html+='<div class="section"><h2>⚠️ Change Collisions <span class="ct">'+coll.length+'</span></h2>';
for(var i=0;i<coll.length;i++){html+='<div class="alert collision-alert"><strong>'+coll[i].title+'</strong><p>'+coll[i].detail+'</p></div>';}html+='</div>';}
var highRisk=d.highRiskChanges||[];
if(highRisk.length){html+='<div class="section"><h2>🔥 High Risk Changes <span class="ct">'+highRisk.length+'</span></h2>';
for(var i=0;i<highRisk.length;i++){var hr=highRisk[i];var link=si+'/nav_to.do?uri=change_request.do?sys_id='+(hr.sys_id||'');
html+='<div class="alert high-risk-alert" onclick="window.open(\''+link+'\',\'_blank\')"><strong>'+(hr.number||'')+' — '+(hr.short_description||'')+'</strong><p>Risk: '+(hr.risk||'')+' · Score: '+(hr.riskScore||'—')+'</p></div>';}html+='</div>';}
var stale=d.staleChanges||[];
if(stale.length){html+='<div class="section"><h2>📋 Stale Changes <span class="ct">'+stale.length+'</span></h2>';
for(var i=0;i<Math.min(stale.length,5);i++){var sc=stale[i];var link=si+'/nav_to.do?uri=change_request.do?sys_id='+(sc.sys_id||'');
html+='<div class="alert stale-alert" onclick="window.open(\''+link+'\',\'_blank\')"><strong>'+(sc.number||'')+' — '+(sc.short_description||'')+'</strong><p>Open '+(sc.daysOpen||0)+' days</p></div>';}html+='</div>';}
var incRisk=d.incidentRisks||[];
if(incRisk.length){html+='<div class="section"><h2>🔴 CIs with Active Incidents <span class="ct">'+incRisk.length+'</span></h2>';
for(var i=0;i<incRisk.length;i++){html+='<div class="alert incident-alert"><strong>'+incRisk[i].title+'</strong><p>'+incRisk[i].detail+'</p></div>';}html+='</div>';}
if(!html)html='<div class="section" style="text-align:center;color:var(--fluent-success);padding:20px">✅ No change risks detected.</div>';
document.getElementById('alerts').innerHTML=html;
var recos=d.recommendations||[];var rhtml='';
for(var i=0;i<recos.length;i++){var uc=recos[i].urgent?' reco-urgent':'';
rhtml+='<div class="reco'+uc+'"><div class="reco-num">'+(i+1)+'</div><div>'+recos[i].text+'</div></div>';}
document.getElementById('recos').innerHTML=rhtml||'<div style="color:var(--fluent-text-tertiary);font-size:12px">No recommendations.</div>';
document.getElementById('footer').textContent='Generated '+ts+' · Data from ServiceNow';
</script>
</body></html>
