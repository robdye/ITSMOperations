<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Incident Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --fluent-bg-primary: #ffffff;
  --fluent-bg-secondary: #f5f5f5;
  --fluent-bg-tertiary: #fafafa;
  --fluent-bg-hover: #f0f0f0;
  --fluent-text-primary: #242424;
  --fluent-text-secondary: #616161;
  --fluent-text-tertiary: #9e9e9e;
  --fluent-border: #e0e0e0;
  --fluent-border-subtle: #f0f0f0;
  --fluent-brand-primary: #0f6cbd;
  --fluent-brand-hover: #115ea3;
  --fluent-brand-bg: #eff6fc;
  --fluent-success: #0e700e;
  --fluent-success-bg: #f1faf1;
  --fluent-warning: #bc4b09;
  --fluent-warning-bg: #fff9f5;
  --fluent-danger: #b10e1c;
  --fluent-danger-bg: #fdf3f4;
  --fluent-info: #0078d4;
  --fluent-info-bg: #f0f6ff;
  --fluent-overlay: rgba(0,0,0,0.4);
  --fluent-shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
  --fluent-shadow-md: 0 4px 8px rgba(0,0,0,0.08);
  --fluent-shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --fluent-radius-sm: 4px;
  --fluent-radius-md: 8px;
  --fluent-radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --fluent-bg-primary: #1f1f1f;
    --fluent-bg-secondary: #2d2d2d;
    --fluent-bg-tertiary: #383838;
    --fluent-bg-hover: #404040;
    --fluent-text-primary: #e0e0e0;
    --fluent-text-secondary: #ababab;
    --fluent-text-tertiary: #787878;
    --fluent-border: #404040;
    --fluent-border-subtle: #333333;
    --fluent-brand-primary: #479ef5;
    --fluent-brand-hover: #62abf5;
    --fluent-brand-bg: #082338;
    --fluent-success: #54b054;
    --fluent-success-bg: #052505;
    --fluent-warning: #f7a648;
    --fluent-warning-bg: #3d1d00;
    --fluent-danger: #e87979;
    --fluent-danger-bg: #3b0509;
    --fluent-info: #62abf5;
    --fluent-info-bg: #001d3a;
    --fluent-overlay: rgba(0,0,0,0.6);
    --fluent-shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
    --fluent-shadow-md: 0 4px 8px rgba(0,0,0,0.28);
    --fluent-shadow-lg: 0 8px 32px rgba(0,0,0,0.36);
  }
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fluent-bg-secondary);color:var(--fluent-text-primary);padding:20px;line-height:1.5}
.widget{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);border:1px solid var(--fluent-border);overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-radius-md);background:var(--fluent-danger-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600}.widget-title p{font-size:12px;color:var(--fluent-text-secondary)}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--fluent-bg-hover);border-bottom:1px solid var(--fluent-border-subtle)}
.kpi{background:var(--fluent-bg-primary);padding:16px 12px;text-align:center;cursor:pointer;transition:all .15s;border-bottom:3px solid transparent}
.kpi:hover{background:var(--fluent-bg-tertiary)}.kpi.active{border-bottom-color:var(--fluent-brand-primary);background:var(--fluent-info-bg)}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.p1{color:var(--fluent-danger)}.p2{color:var(--fluent-warning)}.p3{color:var(--fluent-warning)}.p4{color:var(--fluent-success)}.p5{color:var(--fluent-text-secondary)}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.inc-card{display:grid;grid-template-columns:4px 1fr auto;gap:0;align-items:stretch;background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:var(--fluent-radius-md);overflow:hidden;cursor:pointer;transition:all .15s}
.inc-card:hover{border-color:var(--fluent-brand-primary);box-shadow:var(--fluent-shadow-sm)}
.inc-card:focus{outline:2px solid var(--fluent-brand-primary);outline-offset:2px}
.inc-body{padding:12px;display:flex;flex-direction:column;gap:4px}
.inc-body h3{font-size:13px;font-weight:600}.inc-body .meta{font-size:11px;color:var(--fluent-text-secondary);display:flex;flex-wrap:wrap;gap:8px}
.inc-right{padding:12px 16px 12px 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px}
.state-tag{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sNew{background:var(--fluent-brand-bg);color:var(--fluent-brand-primary)}.sProgress{background:var(--fluent-warning-bg);color:var(--fluent-warning)}.sHold{background:var(--fluent-danger-bg);color:var(--fluent-danger)}.sResolved{background:var(--fluent-success-bg);color:var(--fluent-success)}
.pri-tag{padding:2px 8px;border-radius:var(--fluent-radius-sm);font-size:10px;font-weight:600}
.pri-p1{background:var(--fluent-danger-bg);color:var(--fluent-danger)}.pri-p2{background:var(--fluent-warning-bg);color:var(--fluent-warning)}.pri-p3{background:var(--fluent-warning-bg);color:var(--fluent-warning)}.pri-p4{background:var(--fluent-success-bg);color:var(--fluent-success)}.pri-p5{background:var(--fluent-bg-secondary);color:var(--fluent-text-secondary)}
.empty{text-align:center;color:var(--fluent-text-tertiary);padding:48px 20px;font-size:14px}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);text-align:right;font-size:10px;color:var(--fluent-text-tertiary)}
/* Detail overlay */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--fluent-overlay);z-index:1000;justify-content:center;align-items:flex-start;padding:30px 20px;overflow-y:auto}
.overlay.show{display:flex}
.detail-panel{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);width:100%;max-width:700px;box-shadow:var(--fluent-shadow-lg);overflow:hidden;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail-header{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.detail-header h2{font-size:16px;font-weight:700;flex:1}
.detail-close{width:32px;height:32px;border:none;background:var(--fluent-bg-secondary);border-radius:var(--fluent-radius-md);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.detail-close:hover{background:var(--fluent-border)}
.detail-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.detail-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.detail-field{display:flex;flex-direction:column;gap:4px}
.detail-field.full{grid-column:1/-1}
.detail-field label{font-size:11px;font-weight:600;color:var(--fluent-text-secondary);text-transform:uppercase;letter-spacing:.3px}
.detail-field .val{font-size:13px;color:var(--fluent-text-primary);padding:8px 10px;background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:6px;min-height:36px;word-break:break-word}
.detail-field input,.detail-field select,.detail-field textarea{font-size:13px;font-family:inherit;padding:8px 10px;border:1px solid var(--fluent-border);border-radius:6px;background:var(--fluent-bg-primary);color:var(--fluent-text-primary);transition:border-color .15s}
.detail-field input:focus,.detail-field select:focus,.detail-field textarea:focus{outline:none;border-color:var(--fluent-brand-primary);box-shadow:0 0 0 2px rgba(15,108,189,.12)}
.detail-field textarea{min-height:80px;resize:vertical}
.detail-actions{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--fluent-border-subtle);background:var(--fluent-bg-tertiary)}
.btn{padding:9px 20px;border:none;border-radius:var(--fluent-radius-md);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--fluent-brand-primary);color:#fff}.btn-primary:hover{background:var(--fluent-brand-hover)}
.btn-secondary{background:var(--fluent-bg-primary);color:var(--fluent-text-primary);border:1px solid var(--fluent-border)}.btn-secondary:hover{background:var(--fluent-bg-secondary)}
.btn-snow{background:var(--fluent-bg-primary);color:var(--fluent-brand-primary);border:1px solid var(--fluent-brand-primary);margin-left:auto}.btn-snow:hover{background:var(--fluent-brand-bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--fluent-success);color:#fff;padding:12px 24px;border-radius:var(--fluent-radius-md);font-size:13px;font-weight:600;z-index:1100;display:none;box-shadow:var(--fluent-shadow-md);animation:fadeIn .2s}
.toast.error{background:var(--fluent-danger)}
.toast.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Toolbar */
.toolbar{display:flex;gap:8px;padding:8px 16px;border-bottom:1px solid var(--fluent-border-subtle);background:var(--fluent-bg-tertiary);flex-wrap:wrap;align-items:center}
.toolbar-btn{padding:5px 12px;border:1px solid var(--fluent-border);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:var(--fluent-bg-primary);color:var(--fluent-text-primary);display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.toolbar-btn:hover{background:var(--fluent-brand-bg);border-color:var(--fluent-brand-primary);color:var(--fluent-brand-primary)}
/* Follow-up suggestions */
.followups{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);flex-wrap:wrap}
.followup-btn{padding:6px 14px;border:1px solid var(--fluent-brand-primary);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--fluent-bg-primary);color:var(--fluent-brand-primary);transition:all .15s}
.followup-btn:hover{background:var(--fluent-brand-primary);color:#fff}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header"><div class="widget-icon">🔴</div><div class="widget-title"><h2>Incident Dashboard</h2><p>ServiceNow · Active Incidents</p></div></div>
  <div class="toolbar" id="toolbar"></div>
  <div class="kpis" id="kpis"></div>
  <div class="list" id="list"></div>
  <div class="footer" id="footer"></div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel">
    <div class="detail-header">
      <div class="widget-icon">🔴</div>
      <h2 id="detail-title">Incident Detail</h2>
      <button class="detail-close" onclick="closeDetail()" title="Close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-actions" id="detail-actions"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var allIncidents=to.incidents||[];var si=to.snowInstance||'';
var base=window.__SERVER_BASE_URL__||'';
var counts={};var priorities=['1','2','3','4','5'];
for(var i=0;i<allIncidents.length;i++){var pr=allIncidents[i].priority||'';
for(var j=0;j<priorities.length;j++){if(pr.includes(priorities[j])){counts[priorities[j]]=(counts[priorities[j]]||0)+1;break;}}}
var activeFilter=null;var currentInc=null;
function render(filter){
activeFilter=filter;
var filtered=filter?allIncidents.filter(function(inc){return(inc.priority||'').includes(filter)}):allIncidents;
var kpiData=[{p:'1',cls:'p1',lbl:'P1 Critical'},{p:'2',cls:'p2',lbl:'P2 High'},{p:'3',cls:'p3',lbl:'P3 Moderate'},{p:'4',cls:'p4',lbl:'P4 Low'},{p:'5',cls:'p5',lbl:'P5 Planning'}];
var khtml='';
for(var i=0;i<kpiData.length;i++){var k=kpiData[i];var isActive=filter===k.p?' active':'';
khtml+='<div class="kpi'+isActive+'" onclick="render('+(filter===k.p?'null':"'"+k.p+"'")+')"><div class="val '+k.cls+'">'+(counts[k.p]||0)+'</div><div class="lbl">'+k.lbl+'</div></div>';}
document.getElementById('kpis').innerHTML=khtml;
var html='';
for(var i=0;i<filtered.length;i++){var inc=filtered[i];
var pr=inc.priority||'';var pc=pr.includes('1')?'#d32f2f':pr.includes('2')?'#e65100':pr.includes('3')?'#f57f17':'#2e7d32';
var priCls=pr.includes('1')?'pri-p1':pr.includes('2')?'pri-p2':pr.includes('3')?'pri-p3':pr.includes('4')?'pri-p4':'pri-p5';
var sc=(inc.state||'').toLowerCase();var stClass=sc.includes('new')?'sNew':sc.includes('progress')?'sProgress':sc.includes('hold')?'sHold':sc.includes('resolved')?'sResolved':'sNew';
var cat=inc.category||'General';var ag=inc.assignment_group||'Unassigned';
var opened=inc.opened_at?new Date(inc.opened_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
html+='<div class="inc-card" onclick="openDetail('+i+',\''+filter+'\')" role="button" tabindex="0">'+
'<div style="background:'+pc+'"></div>'+
'<div class="inc-body"><h3>'+(inc.number||'')+' — '+(inc.short_description||'')+'</h3>'+
'<div class="meta"><span>📁 '+cat+'</span><span>👥 '+ag+'</span>'+(opened?'<span>📅 '+opened+'</span>':'')+'</div></div>'+
'<div class="inc-right"><span class="state-tag '+stClass+'">'+(inc.state||'New')+'</span>'+
'<span class="pri-tag '+priCls+'">'+(inc.priority||'Unset')+'</span></div></div>';}
document.getElementById('list').innerHTML=html||'<div class="empty">No'+(filter?' P'+filter:'')+' incidents found.</div>';
document.getElementById('footer').textContent='Showing '+filtered.length+' of '+allIncidents.length+' incident'+(allIncidents.length!==1?'s':'')+' · Data from ServiceNow';}
function openDetail(idx,filter){
var list=filter?allIncidents.filter(function(inc){return(inc.priority||'').includes(filter)}):allIncidents;
var inc=list[idx];if(!inc)return;currentInc=inc;
document.getElementById('detail-title').textContent=(inc.number||'')+' — '+(inc.short_description||'');
var stateOpts=['New','In Progress','On Hold','Resolved','Closed','Canceled'];
var priOpts=['1 - Critical','2 - High','3 - Moderate','4 - Low','5 - Planning'];
var curState=inc.state||'New';var curPri=inc.priority||'';
var opened=inc.opened_at||'';var resolved=inc.resolved_at||'';var closed=inc.closed_at||'';
var h='<div class="detail-row">';
h+='<div class="detail-field"><label>State</label><select id="f-state">';
for(var i=0;i<stateOpts.length;i++){var sel=curState===stateOpts[i]?' selected':'';h+='<option'+sel+'>'+stateOpts[i]+'</option>';}
h+='</select></div>';
h+='<div class="detail-field"><label>Priority</label><select id="f-priority">';
for(var i=0;i<priOpts.length;i++){var sel=curPri.includes(priOpts[i].charAt(0))?' selected':'';h+='<option'+sel+'>'+priOpts[i]+'</option>';}
h+='</select></div></div>';
h+='<div class="detail-row">';
h+='<div class="detail-field"><label>Category</label><input id="f-category" value="'+(inc.category||'').replace(/"/g,'&quot;')+'"></div>';
h+='<div class="detail-field"><label>Assignment Group</label><input id="f-assignment_group" value="'+(inc.assignment_group||'').replace(/"/g,'&quot;')+'"></div></div>';
h+='<div class="detail-row">';
h+='<div class="detail-field"><label>Impact</label><div class="val">'+(inc.impact||'—')+'</div></div>';
h+='<div class="detail-field"><label>Urgency</label><div class="val">'+(inc.urgency||'—')+'</div></div></div>';
h+='<div class="detail-row">';
h+='<div class="detail-field"><label>CI</label><div class="val">'+(inc.cmdb_ci||'—')+'</div></div>';
h+='<div class="detail-field"><label>Caller</label><div class="val">'+(inc.caller_id||'—')+'</div></div></div>';
h+='<div class="detail-row">';
h+='<div class="detail-field"><label>Opened</label><div class="val">'+opened+'</div></div>';
h+='<div class="detail-field"><label>Resolved</label><div class="val">'+(resolved||'—')+'</div></div></div>';
h+='<div class="detail-field full"><label>Short Description</label><input id="f-short_description" value="'+(inc.short_description||'').replace(/"/g,'&quot;')+'"></div>';
h+='<div class="detail-field full"><label>Description</label><textarea id="f-description">'+(inc.description||'')+'</textarea></div>';
h+='<div class="detail-field full"><label>Work Notes (add new)</label><textarea id="f-work_notes" placeholder="Add work notes..."></textarea></div>';
if(inc.close_notes){h+='<div class="detail-field full"><label>Close Notes</label><div class="val">'+inc.close_notes+'</div></div>';}
document.getElementById('detail-body').innerHTML=h;
var link=si+'/nav_to.do?uri=incident.do?sys_id='+(inc.sys_id||'');
document.getElementById('detail-actions').innerHTML=
'<button class="btn btn-primary" id="btn-save" onclick="saveDetail()">💾 Update Incident</button>'+
'<button class="btn btn-secondary" onclick="closeDetail()">Cancel</button>'+
'<a class="btn btn-snow" href="'+link+'" target="_blank" rel="noopener">↗ View in ServiceNow</a>';
document.getElementById('overlay').classList.add('show');}
function closeDetail(){document.getElementById('overlay').classList.remove('show');currentInc=null;}
function showToast(msg,isError){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isError?' error':'');setTimeout(function(){t.classList.remove('show')},3000);}
function saveDetail(){
if(!currentInc||!currentInc.sys_id)return;
var btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Saving...';
var fields={};
var newState=document.getElementById('f-state').value;
var newPri=document.getElementById('f-priority').value;
var newCat=document.getElementById('f-category').value;
var newAg=document.getElementById('f-assignment_group').value;
var newDesc=document.getElementById('f-short_description').value;
var newBody=document.getElementById('f-description').value;
var workNotes=document.getElementById('f-work_notes').value;
if(newState!==(currentInc.state||''))fields.state=newState;
if(!currentInc.priority||!currentInc.priority.includes(newPri.charAt(0)))fields.priority=newPri;
if(newCat!==(currentInc.category||''))fields.category=newCat;
if(newAg!==(currentInc.assignment_group||''))fields.assignment_group=newAg;
if(newDesc!==(currentInc.short_description||''))fields.short_description=newDesc;
if(newBody!==(currentInc.description||''))fields.description=newBody;
if(workNotes)fields.work_notes=workNotes;
if(Object.keys(fields).length===0){btn.disabled=false;btn.textContent='💾 Update Incident';showToast('No changes to save',true);return;}
if(base){fetch(base+'/mcp',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json, text/event-stream'},
body:JSON.stringify({jsonrpc:'2.0',method:'tools/call',params:{name:'update-incident',arguments:{sys_id:currentInc.sys_id,fields:JSON.stringify(fields)}},id:1})})
.then(function(r){return r.json()}).then(function(r){
btn.disabled=false;btn.textContent='💾 Update Incident';
if(r.error){showToast('Update failed: '+(r.error.message||'Unknown error'),true);}
else{showToast('✅ Incident '+currentInc.number+' updated successfully');
for(var k in fields){if(k!=='work_notes')currentInc[k]=fields[k];}
render(activeFilter);}
}).catch(function(e){btn.disabled=false;btn.textContent='💾 Update Incident';showToast('Update failed: '+e.message,true);});}
else{showToast('Server not configured — update simulated');btn.disabled=false;btn.textContent='💾 Update Incident';}}
window.render=render;window.openDetail=openDetail;window.closeDetail=closeDetail;window.saveDetail=saveDetail;
// Toolbar — fullscreen button
var tbHtml='';
if(window.openai&&window.openai.requestDisplayMode){
tbHtml+='<button class="toolbar-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>';}
if(window.openai&&window.openai.openExternal){
tbHtml+='<button class="toolbar-btn" onclick="openInSnow()">↗ Open ServiceNow</button>';}
document.getElementById('toolbar').innerHTML=tbHtml;
if(!tbHtml)document.getElementById('toolbar').style.display='none';
var isFullscreen=false;
function toggleFullscreen(){
if(!window.openai||!window.openai.requestDisplayMode)return;
isFullscreen=!isFullscreen;
window.openai.requestDisplayMode({mode:isFullscreen?'fullscreen':'compact'});}
function openInSnow(){
if(window.openai&&window.openai.openExternal){window.openai.openExternal({href:si});}
else{window.open(si,'_blank');}}
window.toggleFullscreen=toggleFullscreen;window.openInSnow=openInSnow;
render(null);
// Follow-up suggestions
var fuHtml='';
var suggestions=[
{text:'Are there any recent changes on the CIs affected by these P1 incidents?',label:'🔗 Correlate with Changes'},
{text:'Show me the problem dashboard. How many known errors do we have?',label:'🟣 Problem Dashboard'},
{text:'Show me the SLA compliance dashboard',label:'⏱️ SLA Compliance'}];
if(window.openai&&window.openai.sendFollowUpMessage){
for(var i=0;i<suggestions.length;i++){var s=suggestions[i];
fuHtml+='<button class="followup-btn" onclick="sendFollowUp(\''+s.text.replace(/'/g,"\\'")+'\')">'+s.label+'</button>';}
var fuDiv=document.createElement('div');fuDiv.className='followups';fuDiv.innerHTML=fuHtml;
document.querySelector('.widget').appendChild(fuDiv);}
function sendFollowUp(prompt){if(window.openai&&window.openai.sendFollowUpMessage){window.openai.sendFollowUpMessage({prompt:prompt});}}
window.sendFollowUp=sendFollowUp;
</script>
</body></html>
