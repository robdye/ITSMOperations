<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Request Dashboard</title>
<style>
:root {
  --fluent-colorNeutralBackground1: #ffffff;
  --fluent-colorNeutralBackground2: #fafafa;
  --fluent-colorNeutralBackground3: #f5f5f5;
  --fluent-colorNeutralForeground1: #242424;
  --fluent-colorNeutralForeground2: #616161;
  --fluent-colorNeutralForeground3: #9e9e9e;
  --fluent-colorNeutralStroke1: #e0e0e0;
  --fluent-colorBrandBackground: #0f6cbd;
  --fluent-colorBrandForeground1: #0f6cbd;
  --fluent-colorPaletteRedBackground3: #c50f1f;
  --fluent-colorPaletteRedForeground1: #c50f1f;
  --fluent-colorPaletteGreenBackground3: #107c10;
  --fluent-colorPaletteGreenForeground1: #107c10;
  --fluent-colorPaletteYellowBackground3: #f7630c;
  --fluent-colorPaletteYellowForeground1: #f7630c;
  --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.12);
  --fluent-colorNeutralShadowKey: rgba(0,0,0,0.14);
  --fluent-borderRadiusMedium: 8px;
  --fluent-borderRadiusLarge: 12px;
  --fluent-fontFamilyBase: 'Segoe UI', -apple-system, system-ui, sans-serif;
  --fluent-fontSizeBase300: 14px;
  --fluent-fontSizeBase400: 16px;
  --fluent-fontSizeBase500: 20px;
  --fluent-fontSizeBase600: 24px;
  --fluent-fontWeightSemibold: 600;
  --fluent-spacingHorizontalM: 12px;
  --fluent-spacingHorizontalL: 16px;
  --fluent-spacingVerticalM: 12px;
  --fluent-spacingVerticalL: 16px;
  --fluent-shadow4: 0 2px 4px var(--fluent-colorNeutralShadowAmbient), 0 1px 2px var(--fluent-colorNeutralShadowKey);
  --fluent-shadow8: 0 4px 8px var(--fluent-colorNeutralShadowAmbient), 0 2px 4px var(--fluent-colorNeutralShadowKey);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fluent-colorNeutralBackground1: #1f1f1f;
    --fluent-colorNeutralBackground2: #292929;
    --fluent-colorNeutralBackground3: #333333;
    --fluent-colorNeutralForeground1: #ffffff;
    --fluent-colorNeutralForeground2: #d6d6d6;
    --fluent-colorNeutralForeground3: #adadad;
    --fluent-colorNeutralStroke1: #404040;
    --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.24);
    --fluent-colorNeutralShadowKey: rgba(0,0,0,0.28);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fluent-fontFamilyBase);background:var(--fluent-colorNeutralBackground3);color:var(--fluent-colorNeutralForeground1);padding:20px;line-height:1.5}
.widget{background:var(--fluent-colorNeutralBackground1);border-radius:var(--fluent-borderRadiusLarge);border:1px solid var(--fluent-colorNeutralStroke1);overflow:hidden;max-width:960px;margin:0 auto;box-shadow:var(--fluent-shadow8)}
.widget-header{display:flex;align-items:center;gap:10px;padding:var(--fluent-spacingVerticalL) 20px;border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-borderRadiusMedium);background:#e8f4f8;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:var(--fluent-fontSizeBase400);font-weight:var(--fluent-fontWeightSemibold)}
.widget-title p{font-size:12px;color:var(--fluent-colorNeutralForeground2)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--fluent-colorNeutralStroke1);border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.kpi{background:var(--fluent-colorNeutralBackground1);padding:var(--fluent-spacingVerticalL) var(--fluent-spacingHorizontalM);text-align:center;cursor:pointer;transition:background .15s;border-bottom:3px solid transparent}
.kpi:hover{background:var(--fluent-colorNeutralBackground2)}
.kpi:focus{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:-2px}
.kpi.active{border-bottom-color:var(--fluent-colorBrandBackground);background:var(--fluent-colorNeutralBackground2)}
.kpi .val{font-size:var(--fluent-fontSizeBase600);font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-colorNeutralForeground2);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.risk-high{color:var(--fluent-colorPaletteRedForeground1)}.risk-moderate{color:var(--fluent-colorPaletteYellowForeground1)}.risk-low{color:var(--fluent-colorPaletteGreenForeground1)}
.table-wrap{overflow-x:auto;padding:0}
table{width:100%;border-collapse:collapse;font-size:var(--fluent-fontSizeBase300)}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:var(--fluent-fontWeightSemibold);text-transform:uppercase;letter-spacing:.3px;color:var(--fluent-colorNeutralForeground2);background:var(--fluent-colorNeutralBackground2);border-bottom:1px solid var(--fluent-colorNeutralStroke1);position:sticky;top:0}
td{padding:10px 14px;border-bottom:1px solid var(--fluent-colorNeutralStroke1);vertical-align:middle}
tr:hover td{background:var(--fluent-colorNeutralBackground2)}
tr:focus-within td{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:-2px}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:var(--fluent-fontWeightSemibold);white-space:nowrap}
.badge-high{background:#fde7e9;color:var(--fluent-colorPaletteRedForeground1)}.badge-moderate{background:#fff4e5;color:var(--fluent-colorPaletteYellowForeground1)}.badge-low{background:#e6f4e6;color:var(--fluent-colorPaletteGreenForeground1)}
.badge-state{background:var(--fluent-colorNeutralBackground3);color:var(--fluent-colorNeutralForeground2)}
.link{color:var(--fluent-colorBrandForeground1);text-decoration:none;font-weight:var(--fluent-fontWeightSemibold)}
.link:hover{text-decoration:underline}
.empty{text-align:center;color:var(--fluent-colorNeutralForeground3);padding:48px 20px;font-size:var(--fluent-fontSizeBase300)}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-colorNeutralStroke1);text-align:right;font-size:10px;color:var(--fluent-colorNeutralForeground3)}
</style>
</head>
<body>
<div class="widget" role="region" aria-label="Change Request Dashboard">
  <div class="widget-header"><div class="widget-icon">🔄</div><div class="widget-title"><h2>Change Request Dashboard</h2><p>ServiceNow · Change Management</p></div></div>
  <div class="kpis" id="kpis" role="tablist" aria-label="Change request summary"></div>
  <div class="table-wrap"><table role="grid" aria-label="Change requests table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  <div class="empty" id="empty" style="display:none" role="status">No change requests found.</div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var changes=to.changes||[];
var si=to.snowInstance||'';
var activeFilter=null;

function riskClass(r){var l=(r||'').toLowerCase();if(l.indexOf('high')>-1)return'high';if(l.indexOf('moderate')>-1||l.indexOf('med')>-1)return'moderate';return'low';}
function riskLabel(r){var c=riskClass(r);return{high:'High',moderate:'Moderate',low:'Low'}[c]||'Low';}

function countBy(arr,key){var m={};for(var i=0;i<arr.length;i++){var v=arr[i][key]||'Unknown';m[v]=(m[v]||0)+1;}return m;}

function buildKpis(){
  var el=document.getElementById('kpis');
  var riskCounts=countBy(changes,'risk');
  var stateCounts=countBy(changes,'state');
  var high=0,moderate=0,low=0;
  for(var i=0;i<changes.length;i++){var c=riskClass(changes[i].risk);if(c==='high')high++;else if(c==='moderate')moderate++;else low++;}
  var items=[
    {val:changes.length,lbl:'Total',filter:null,cls:''},
    {val:high,lbl:'High Risk',filter:'high',cls:'risk-high'},
    {val:moderate,lbl:'Moderate',filter:'moderate',cls:'risk-moderate'},
    {val:low,lbl:'Low Risk',filter:'low',cls:'risk-low'}
  ];
  var html='';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    html+='<div class="kpi'+(activeFilter===it.filter?' active':'')+'" role="tab" tabindex="0" aria-selected="'+(activeFilter===it.filter)+'" data-filter="'+(it.filter||'')+'" onclick="filterBy('+(it.filter?"\'"+it.filter+"\'":"null")+')" onkeydown="if(event.key===\'Enter\')this.click()"><div class="val '+it.cls+'">'+it.val+'</div><div class="lbl">'+it.lbl+'</div></div>';
  }
  el.innerHTML=html;
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function buildTable(){
  var thead=document.getElementById('thead');
  thead.innerHTML='<tr><th scope="col">Number</th><th scope="col">Description</th><th scope="col">Type</th><th scope="col">Risk</th><th scope="col">State</th><th scope="col">Planned Start</th><th scope="col">Assigned To</th></tr>';
  var filtered=changes;
  if(activeFilter){filtered=changes.filter(function(c){return riskClass(c.risk)===activeFilter;});}
  var tbody=document.getElementById('tbody');
  var emptyEl=document.getElementById('empty');
  if(filtered.length===0){tbody.innerHTML='';emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  var html='';
  for(var i=0;i<filtered.length;i++){
    var c=filtered[i];var rc=riskClass(c.risk);
    var numLink=si?'<a class="link" href="'+esc(si)+'/nav_to.do?uri=change_request.do?sysparm_query=number='+esc(c.number)+'" target="_blank" rel="noopener">'+esc(c.number)+'</a>':esc(c.number);
    html+='<tr tabindex="0"><td>'+numLink+'</td><td>'+esc(c.short_description||c.shortDescription||'')+'</td><td>'+esc(c.type||'Normal')+'</td><td><span class="badge badge-'+rc+'">'+riskLabel(c.risk)+'</span></td><td><span class="badge badge-state">'+esc(c.state||'New')+'</span></td><td>'+esc(c.planned_start||c.plannedStart||'—')+'</td><td>'+esc(c.assigned_to||c.assignedTo||'Unassigned')+'</td></tr>';
  }
  tbody.innerHTML=html;
}

function filterBy(f){activeFilter=activeFilter===f?null:f;buildKpis();buildTable();}

buildKpis();
buildTable();
document.getElementById('footer').textContent='Showing '+changes.length+' change request'+(changes.length!==1?'s':'')+' · '+new Date().toLocaleString();
</script>
</body>
</html>
