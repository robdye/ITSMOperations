<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FinOps Dashboard</title>
<style>
:root{
  --colorNeutralBackground1:#ffffff;--colorNeutralBackground2:#fafafa;--colorNeutralBackground3:#f5f5f5;
  --colorNeutralForeground1:#242424;--colorNeutralForeground2:#616161;--colorNeutralForeground3:#9e9e9e;
  --colorNeutralStroke1:#e0e0e0;--colorNeutralStroke2:#f0f0f0;
  --colorBrandBackground:#0078d4;--colorBrandForeground1:#0078d4;
  --colorPaletteGreenBackground1:#e8f5e9;--colorPaletteGreenForeground1:#2e7d32;
  --colorPaletteRedBackground1:#ffebee;--colorPaletteRedForeground1:#c62828;
  --colorPaletteYellowBackground1:#fff8e1;--colorPaletteYellowForeground1:#f57f17;
  --colorPaletteDarkOrangeBackground1:#fff3e0;--colorPaletteDarkOrangeForeground1:#e65100;
  --borderRadiusMedium:8px;--borderRadiusLarge:12px;
  --shadow4:0 2px 8px rgba(0,0,0,.08);--shadow8:0 4px 16px rgba(0,0,0,.12);
  --fontFamilyBase:'Segoe UI',system-ui,-apple-system,sans-serif;
  --fontSizeBase200:12px;--fontSizeBase300:13px;--fontSizeBase400:14px;--fontSizeBase500:16px;--fontSizeBase600:20px;
  --fontWeightSemibold:600;--fontWeightBold:700;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fontFamilyBase);background:var(--colorNeutralBackground3);color:var(--colorNeutralForeground1);padding:20px;line-height:1.5}
.widget{background:var(--colorNeutralBackground1);border-radius:var(--borderRadiusLarge);border:1px solid var(--colorNeutralStroke1);overflow:hidden;max-width:960px;margin:0 auto;box-shadow:var(--shadow4)}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--colorNeutralStroke2)}
.widget-icon{width:36px;height:36px;border-radius:var(--borderRadiusMedium);background:var(--colorPaletteDarkOrangeBackground1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.widget-title h2{font-size:var(--fontSizeBase500);font-weight:var(--fontWeightSemibold)}
.widget-title p{font-size:var(--fontSizeBase200);color:var(--colorNeutralForeground2)}

/* KPI row */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--colorNeutralStroke2);border-bottom:1px solid var(--colorNeutralStroke2)}
.kpi{background:var(--colorNeutralBackground1);padding:14px 12px;text-align:center}
.kpi .val{font-size:var(--fontSizeBase600);font-weight:var(--fontWeightBold);line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--colorNeutralForeground2);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}

/* Section scaffolding */
.sections{padding:16px;display:flex;flex-direction:column;gap:16px}
.section{background:var(--colorNeutralBackground2);border:1px solid var(--colorNeutralStroke1);border-radius:10px;overflow:hidden}
.section-header{padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .15s}
.section-header:hover{background:var(--colorNeutralStroke2)}
.section-header:focus-visible{outline:2px solid var(--colorBrandBackground);outline-offset:-2px;border-radius:10px 10px 0 0}
.section-header h3{font-size:var(--fontSizeBase400);font-weight:var(--fontWeightSemibold);flex:1}
.section-toggle{font-size:12px;color:var(--colorNeutralForeground3);transition:transform .2s}
.section-toggle.open{transform:rotate(180deg)}
.section-body{display:none;border-top:1px solid var(--colorNeutralStroke1);padding:14px 16px}
.section-body.show{display:block}

/* Cost Trend Chart */
.chart-container{overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart{display:flex;align-items:flex-end;gap:3px;height:160px;padding:0 4px}
.bar-wrapper{display:flex;flex-direction:column;align-items:center;flex:1;min-width:18px;gap:4px}
.bar{width:100%;min-width:14px;max-width:28px;border-radius:4px 4px 0 0;background:var(--colorBrandBackground);transition:height .3s ease,opacity .15s;cursor:pointer;position:relative}
.bar:hover,.bar:focus-visible{opacity:.8;outline:2px solid var(--colorBrandBackground);outline-offset:1px}
.bar-label{font-size:9px;color:var(--colorNeutralForeground3);writing-mode:vertical-rl;text-orientation:mixed;white-space:nowrap;max-height:48px;overflow:hidden}
.bar-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:10;pointer-events:none}
.bar:hover .bar-tooltip,.bar:focus .bar-tooltip{display:block}

/* Drivers table */
.drivers-table{width:100%;border-collapse:collapse;font-size:var(--fontSizeBase300)}
.drivers-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--colorNeutralForeground2);padding:6px 8px;border-bottom:2px solid var(--colorNeutralStroke1);font-weight:var(--fontWeightSemibold)}
.drivers-table td{padding:8px;border-bottom:1px solid var(--colorNeutralStroke2);vertical-align:middle}
.drivers-table tr:last-child td{border-bottom:none}
.drivers-table tr:hover td{background:var(--colorNeutralBackground1)}
.cost-bar-cell{display:flex;align-items:center;gap:8px}
.cost-bar-bg{flex:1;height:8px;background:var(--colorNeutralStroke1);border-radius:4px;overflow:hidden;min-width:60px}
.cost-bar-fill{height:100%;border-radius:4px;background:var(--colorBrandBackground)}
.change-up{color:var(--colorPaletteRedForeground1);font-weight:var(--fontWeightSemibold);font-size:12px}
.change-down{color:var(--colorPaletteGreenForeground1);font-weight:var(--fontWeightSemibold);font-size:12px}
.change-flat{color:var(--colorNeutralForeground3);font-size:12px}

/* Recommendations table */
.rec-table{width:100%;border-collapse:collapse;font-size:var(--fontSizeBase300)}
.rec-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--colorNeutralForeground2);padding:6px 8px;border-bottom:2px solid var(--colorNeutralStroke1);font-weight:var(--fontWeightSemibold)}
.rec-table td{padding:8px;border-bottom:1px solid var(--colorNeutralStroke2);vertical-align:middle}
.rec-table tr:last-child td{border-bottom:none}
.rec-table tr:hover td{background:var(--colorNeutralBackground1)}
.sku-arrow{color:var(--colorPaletteGreenForeground1);font-weight:var(--fontWeightBold);margin:0 4px}
.savings-tag{display:inline-block;background:var(--colorPaletteGreenBackground1);color:var(--colorPaletteGreenForeground1);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:var(--fontWeightSemibold)}

/* Budget gauge */
.gauge-wrapper{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
.gauge-row{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
.gauge-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-bar-container{width:180px;height:18px;background:var(--colorNeutralStroke1);border-radius:9px;overflow:hidden;position:relative}
.gauge-bar-fill{height:100%;border-radius:9px;transition:width .4s ease}
.gauge-bar-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:var(--fontWeightBold);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.gauge-sublabel{font-size:12px;color:var(--colorNeutralForeground2);text-align:center}
.gauge-sublabel strong{color:var(--colorNeutralForeground1);font-weight:var(--fontWeightBold)}
.budget-legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;font-size:12px;color:var(--colorNeutralForeground2)}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* Anomalies */
.anomaly-list{display:flex;flex-direction:column;gap:8px}
.anomaly-card{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--colorNeutralStroke1);border-radius:var(--borderRadiusMedium);background:var(--colorNeutralBackground1);transition:box-shadow .15s}
.anomaly-card:hover{box-shadow:var(--shadow4)}
.anomaly-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.anomaly-icon.high{background:var(--colorPaletteRedBackground1)}
.anomaly-icon.medium{background:var(--colorPaletteYellowBackground1)}
.anomaly-icon.low{background:var(--colorPaletteGreenBackground1)}
.anomaly-info{min-width:0}
.anomaly-info h4{font-size:var(--fontSizeBase300);font-weight:var(--fontWeightSemibold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.anomaly-info .meta{font-size:11px;color:var(--colorNeutralForeground2)}
.anomaly-cost{text-align:right;white-space:nowrap}
.anomaly-cost .expected{font-size:11px;color:var(--colorNeutralForeground3);text-decoration:line-through}
.anomaly-cost .actual{font-size:var(--fontSizeBase400);font-weight:var(--fontWeightBold);color:var(--colorPaletteRedForeground1)}
.severity-tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:var(--fontWeightSemibold);text-transform:uppercase}
.severity-high{background:var(--colorPaletteRedBackground1);color:var(--colorPaletteRedForeground1)}
.severity-medium{background:var(--colorPaletteYellowBackground1);color:var(--colorPaletteYellowForeground1)}
.severity-low{background:var(--colorPaletteGreenBackground1);color:var(--colorPaletteGreenForeground1)}

.empty{text-align:center;color:var(--colorNeutralForeground3);padding:32px 20px;font-size:var(--fontSizeBase400)}
.footer{padding:10px 16px;border-top:1px solid var(--colorNeutralStroke2);text-align:right;font-size:10px;color:var(--colorNeutralForeground3)}

/* Responsive */
@media(max-width:700px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .gauge-row{flex-direction:column;align-items:center}
  .drivers-table th:nth-child(3),.drivers-table td:nth-child(3){display:none}
  .rec-table th:nth-child(4),.rec-table td:nth-child(4){display:none}
  .anomaly-card{grid-template-columns:auto 1fr}
  .anomaly-cost{grid-column:2;text-align:left}
}
@media(max-width:480px){
  body{padding:10px}
  .chart{height:100px}
}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
  .bar,.gauge-bar-fill,.cost-bar-fill{transition:none}
  .section-toggle{transition:none}
}
</style>
</head>
<body>
<div class="widget" role="main" aria-label="FinOps Dashboard">
  <div class="widget-header">
    <div class="widget-icon" aria-hidden="true">💰</div>
    <div class="widget-title"><h2>FinOps Dashboard</h2><p>Cloud Cost Management &amp; Optimization</p></div>
  </div>
  <div class="kpis" id="kpis" role="region" aria-label="Key metrics"></div>
  <div class="sections" id="sections"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
var td=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var costTrend=td.costTrend||[];
var topDrivers=(td.topDrivers||[]).slice(0,5);
var recommendations=td.recommendations||[];
var budget=td.budget||{};
var anomalies=td.anomalies||[];
var genAt=td.generatedAt||'';

function fmt(n){if(n==null)return'$0';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+Number(n).toLocaleString();}
function fmtFull(n){return'$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});}
function pct(v,t){return t>0?Math.round(v/t*100):0;}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// KPIs
var totalSpend=costTrend.reduce(function(s,d){return s+(d.cost||0);},0);
var avgDaily=costTrend.length>0?totalSpend/costTrend.length:0;
var totalSavings=recommendations.reduce(function(s,r){return s+(r.savings||0);},0);
var budgetPct=budget.allocated>0?pct(budget.actual||0,budget.allocated):0;

var kpiHtml='';
var kpiData=[
  {val:fmt(totalSpend),lbl:'Total Spend (30d)',color:budgetPct>90?'var(--colorPaletteRedForeground1)':'var(--colorBrandForeground1)'},
  {val:fmt(avgDaily),lbl:'Avg Daily Cost',color:'var(--colorNeutralForeground1)'},
  {val:fmt(totalSavings),lbl:'Potential Savings',color:'var(--colorPaletteGreenForeground1)'},
  {val:anomalies.length,lbl:'Anomalies',color:anomalies.length>0?'var(--colorPaletteDarkOrangeForeground1)':'var(--colorPaletteGreenForeground1)'}
];
for(var i=0;i<kpiData.length;i++){
  var k=kpiData[i];
  kpiHtml+='<div class="kpi"><div class="val" style="color:'+k.color+'">'+k.val+'</div><div class="lbl">'+k.lbl+'</div></div>';
}
document.getElementById('kpis').innerHTML=kpiHtml;

// Sections
var sectionsHtml='';

// --- Cost Trend ---
sectionsHtml+='<div class="section" role="region" aria-label="Cost Trend">';
sectionsHtml+='<div class="section-header" tabindex="0" role="button" aria-expanded="true" onclick="toggleSection(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSection(this)}">';
sectionsHtml+='<h3>📊 Cost Trend (Last 30 Days)</h3><span class="section-toggle open" aria-hidden="true">▼</span></div>';
sectionsHtml+='<div class="section-body show">';
if(costTrend.length===0){
  sectionsHtml+='<div class="empty">No cost data available</div>';
}else{
  var maxCost=0;
  for(var i=0;i<costTrend.length;i++){if(costTrend[i].cost>maxCost)maxCost=costTrend[i].cost;}
  sectionsHtml+='<div class="chart-container"><div class="chart" role="img" aria-label="Bar chart of daily costs over the last 30 days">';
  for(var i=0;i<costTrend.length;i++){
    var d=costTrend[i];
    var h=maxCost>0?Math.max(4,Math.round(d.cost/maxCost*140)):4;
    var dayLabel=(d.date||'').slice(5);
    sectionsHtml+='<div class="bar-wrapper"><div class="bar" tabindex="0" role="img" aria-label="'+esc(d.date)+': '+fmtFull(d.cost)+'" style="height:'+h+'px"><span class="bar-tooltip">'+esc(d.date)+'<br>'+fmtFull(d.cost)+'</span></div><span class="bar-label" aria-hidden="true">'+esc(dayLabel)+'</span></div>';
  }
  sectionsHtml+='</div></div>';
}
sectionsHtml+='</div></div>';

// --- Top Cost Drivers ---
sectionsHtml+='<div class="section" role="region" aria-label="Top Cost Drivers">';
sectionsHtml+='<div class="section-header" tabindex="0" role="button" aria-expanded="true" onclick="toggleSection(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSection(this)}">';
sectionsHtml+='<h3>🔝 Top 5 Cost Drivers</h3><span class="section-toggle open" aria-hidden="true">▼</span></div>';
sectionsHtml+='<div class="section-body show">';
if(topDrivers.length===0){
  sectionsHtml+='<div class="empty">No cost driver data</div>';
}else{
  var maxDriverCost=0;
  for(var i=0;i<topDrivers.length;i++){if(topDrivers[i].cost>maxDriverCost)maxDriverCost=topDrivers[i].cost;}
  sectionsHtml+='<div style="overflow-x:auto"><table class="drivers-table" role="table"><thead><tr><th scope="col">Resource</th><th scope="col">Type</th><th scope="col">Cost</th><th scope="col">Change</th></tr></thead><tbody>';
  for(var i=0;i<topDrivers.length;i++){
    var dr=topDrivers[i];
    var chg=dr.change||0;
    var chgCls=chg>0?'change-up':chg<0?'change-down':'change-flat';
    var chgTxt=chg>0?'▲ +'+chg.toFixed(1)+'%':chg<0?'▼ '+chg.toFixed(1)+'%':'— 0%';
    var barW=maxDriverCost>0?Math.max(5,Math.round(dr.cost/maxDriverCost*100)):5;
    sectionsHtml+='<tr><td><strong>'+esc(dr.resource)+'</strong></td><td style="color:var(--colorNeutralForeground2);font-size:12px">'+esc(dr.type)+'</td>';
    sectionsHtml+='<td><div class="cost-bar-cell"><span style="min-width:60px">'+fmtFull(dr.cost)+'</span><div class="cost-bar-bg"><div class="cost-bar-fill" style="width:'+barW+'%"></div></div></div></td>';
    sectionsHtml+='<td><span class="'+chgCls+'">'+chgTxt+'</span></td></tr>';
  }
  sectionsHtml+='</tbody></table></div>';
}
sectionsHtml+='</div></div>';

// --- Right-Sizing Recommendations ---
sectionsHtml+='<div class="section" role="region" aria-label="Right-Sizing Recommendations">';
sectionsHtml+='<div class="section-header" tabindex="0" role="button" aria-expanded="true" onclick="toggleSection(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSection(this)}">';
sectionsHtml+='<h3>⚙️ Right-Sizing Recommendations</h3><span class="section-toggle open" aria-hidden="true">▼</span></div>';
sectionsHtml+='<div class="section-body show">';
if(recommendations.length===0){
  sectionsHtml+='<div class="empty">No recommendations at this time</div>';
}else{
  sectionsHtml+='<div style="overflow-x:auto"><table class="rec-table" role="table"><thead><tr><th scope="col">Resource</th><th scope="col">SKU Change</th><th scope="col">Savings</th><th scope="col">Reason</th></tr></thead><tbody>';
  for(var i=0;i<recommendations.length;i++){
    var r=recommendations[i];
    sectionsHtml+='<tr><td><strong>'+esc(r.resource)+'</strong></td>';
    sectionsHtml+='<td><span style="text-decoration:line-through;color:var(--colorNeutralForeground3)">'+esc(r.currentSku)+'</span><span class="sku-arrow">→</span><span style="color:var(--colorPaletteGreenForeground1);font-weight:600">'+esc(r.recommendedSku)+'</span></td>';
    sectionsHtml+='<td><span class="savings-tag">'+fmt(r.savings)+'/mo</span></td>';
    sectionsHtml+='<td style="font-size:12px;color:var(--colorNeutralForeground2);max-width:200px">'+esc(r.reason)+'</td></tr>';
  }
  sectionsHtml+='</tbody></table></div>';
}
sectionsHtml+='</div></div>';

// --- Budget vs Actual ---
sectionsHtml+='<div class="section" role="region" aria-label="Budget vs Actual">';
sectionsHtml+='<div class="section-header" tabindex="0" role="button" aria-expanded="true" onclick="toggleSection(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSection(this)}">';
sectionsHtml+='<h3>📏 Budget vs Actual</h3><span class="section-toggle open" aria-hidden="true">▼</span></div>';
sectionsHtml+='<div class="section-body show">';
if(!budget.allocated){
  sectionsHtml+='<div class="empty">No budget data available</div>';
}else{
  var alloc=budget.allocated||0;
  var actual=budget.actual||0;
  var forecast=budget.forecast||0;
  var actualPct=Math.min(100,pct(actual,alloc));
  var forecastPct=Math.min(100,pct(forecast,alloc));
  var actualColor=actualPct>90?'var(--colorPaletteRedForeground1)':actualPct>75?'var(--colorPaletteDarkOrangeForeground1)':'var(--colorPaletteGreenForeground1)';
  var forecastColor=forecastPct>100?'var(--colorPaletteRedForeground1)':forecastPct>90?'var(--colorPaletteDarkOrangeForeground1)':'var(--colorBrandForeground1)';

  sectionsHtml+='<div class="gauge-wrapper">';
  sectionsHtml+='<div class="gauge-row">';

  // Actual gauge
  sectionsHtml+='<div class="gauge-item" role="meter" aria-label="Actual spend" aria-valuenow="'+actual+'" aria-valuemin="0" aria-valuemax="'+alloc+'">';
  sectionsHtml+='<div class="gauge-bar-container"><div class="gauge-bar-fill" style="width:'+actualPct+'%;background:'+actualColor+'"><span class="gauge-bar-label">'+actualPct+'%</span></div></div>';
  sectionsHtml+='<div class="gauge-sublabel"><strong>Actual:</strong> '+fmtFull(actual)+' / '+fmtFull(alloc)+'</div></div>';

  // Forecast gauge
  sectionsHtml+='<div class="gauge-item" role="meter" aria-label="Forecast spend" aria-valuenow="'+forecast+'" aria-valuemin="0" aria-valuemax="'+alloc+'">';
  sectionsHtml+='<div class="gauge-bar-container"><div class="gauge-bar-fill" style="width:'+forecastPct+'%;background:'+forecastColor+'"><span class="gauge-bar-label">'+forecastPct+'%</span></div></div>';
  sectionsHtml+='<div class="gauge-sublabel"><strong>Forecast:</strong> '+fmtFull(forecast)+' / '+fmtFull(alloc)+'</div></div>';

  sectionsHtml+='</div>';
  sectionsHtml+='<div class="budget-legend"><span><span class="legend-dot" style="background:var(--colorPaletteGreenForeground1)"></span>On Track (&lt;75%)</span><span><span class="legend-dot" style="background:var(--colorPaletteDarkOrangeForeground1)"></span>Warning (75–90%)</span><span><span class="legend-dot" style="background:var(--colorPaletteRedForeground1)"></span>Over Budget (&gt;90%)</span></div>';
  sectionsHtml+='</div>';
}
sectionsHtml+='</div></div>';

// --- Anomaly Alerts ---
sectionsHtml+='<div class="section" role="region" aria-label="Cost Anomalies">';
sectionsHtml+='<div class="section-header" tabindex="0" role="button" aria-expanded="'+(anomalies.length>0?'true':'false')+'" onclick="toggleSection(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSection(this)}">';
sectionsHtml+='<h3>🚨 Anomaly Alerts'+(anomalies.length>0?' <span class="severity-tag severity-high" style="margin-left:6px">'+anomalies.length+'</span>':'')+'</h3><span class="section-toggle'+(anomalies.length>0?' open':'')+'" aria-hidden="true">▼</span></div>';
sectionsHtml+='<div class="section-body'+(anomalies.length>0?' show':'')+'">';
if(anomalies.length===0){
  sectionsHtml+='<div class="empty" style="color:var(--colorPaletteGreenForeground1)">✅ No anomalies detected</div>';
}else{
  sectionsHtml+='<div class="anomaly-list" role="list">';
  for(var i=0;i<anomalies.length;i++){
    var a=anomalies[i];
    var sev=(a.severity||'medium').toLowerCase();
    var sevIcon=sev==='high'?'⚠️':sev==='medium'?'🔶':'🔹';
    var spike=a.expectedCost>0?Math.round((a.actualCost-a.expectedCost)/a.expectedCost*100):0;
    sectionsHtml+='<div class="anomaly-card" role="listitem">';
    sectionsHtml+='<div class="anomaly-icon '+sev+'" aria-hidden="true">'+sevIcon+'</div>';
    sectionsHtml+='<div class="anomaly-info"><h4>'+esc(a.resource)+'</h4><div class="meta">'+esc(a.date)+' · <span class="severity-tag severity-'+sev+'">'+sev+'</span>'+(spike>0?' · +'+spike+'% spike':'')+'</div></div>';
    sectionsHtml+='<div class="anomaly-cost"><div class="expected">'+fmtFull(a.expectedCost)+'</div><div class="actual">'+fmtFull(a.actualCost)+'</div></div>';
    sectionsHtml+='</div>';
  }
  sectionsHtml+='</div>';
}
sectionsHtml+='</div></div>';

document.getElementById('sections').innerHTML=sectionsHtml;

// Footer
document.getElementById('footer').textContent=genAt?'Generated '+genAt:'';

// Toggle sections
function toggleSection(el){
  var body=el.nextElementSibling;
  var toggle=el.querySelector('.section-toggle');
  var isOpen=body.classList.contains('show');
  if(isOpen){body.classList.remove('show');toggle.classList.remove('open');el.setAttribute('aria-expanded','false');}
  else{body.classList.add('show');toggle.classList.add('open');el.setAttribute('aria-expanded','true');}
}
</script>
