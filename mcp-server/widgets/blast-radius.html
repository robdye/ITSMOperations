<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blast Radius</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fluent-bg-primary:#ffffff;--fluent-bg-secondary:#f5f5f5;--fluent-bg-tertiary:#fafafa;--fluent-bg-hover:#f0f0f0;
  --fluent-text-primary:#242424;--fluent-text-secondary:#616161;--fluent-text-tertiary:#9e9e9e;
  --fluent-border:#e0e0e0;--fluent-border-subtle:#f0f0f0;
  --fluent-brand-primary:#0f6cbd;--fluent-brand-hover:#115ea3;--fluent-brand-bg:#eff6fc;
  --fluent-success:#0e700e;--fluent-success-bg:#f1faf1;--fluent-warning:#bc4b09;--fluent-warning-bg:#fff9f5;
  --fluent-danger:#b10e1c;--fluent-danger-bg:#fdf3f4;--fluent-info:#0078d4;--fluent-info-bg:#f0f6ff;
  --fluent-overlay:rgba(0,0,0,0.4);
  --fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.04);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.08);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --fluent-radius-sm:4px;--fluent-radius-md:8px;--fluent-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --fluent-bg-primary:#1f1f1f;--fluent-bg-secondary:#2d2d2d;--fluent-bg-tertiary:#383838;--fluent-bg-hover:#404040;
    --fluent-text-primary:#e0e0e0;--fluent-text-secondary:#ababab;--fluent-text-tertiary:#787878;
    --fluent-border:#404040;--fluent-border-subtle:#333333;
    --fluent-brand-primary:#479ef5;--fluent-brand-hover:#62abf5;--fluent-brand-bg:#082338;
    --fluent-success:#54b054;--fluent-success-bg:#052505;--fluent-warning:#f7a648;--fluent-warning-bg:#3d1d00;
    --fluent-danger:#e87979;--fluent-danger-bg:#3b0509;--fluent-info:#62abf5;--fluent-info-bg:#001d3a;
    --fluent-overlay:rgba(0,0,0,0.6);
    --fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.2);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.28);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.36);
  }
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fluent-bg-secondary);color:var(--fluent-text-primary);padding:20px;line-height:1.5}
.widget{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);border:1px solid var(--fluent-border);overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-radius-md);background:var(--fluent-danger-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600}.widget-title p{font-size:12px;color:var(--fluent-text-secondary)}
.graph-area{padding:20px;min-height:340px;position:relative}
.graph-svg{width:100%;height:400px}
.node{cursor:pointer}
.node-icon{font-size:28px}
.node-label{font-size:11px;font-family:'Segoe UI',system-ui,sans-serif;fill:var(--fluent-text-primary);font-weight:500}
.node-label-central{font-weight:700;font-size:12px}
.node:hover .node-bg{filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
@keyframes flowDown{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
@keyframes flowUp{0%{stroke-dashoffset:0}100%{stroke-dashoffset:20}}
.edge-downstream{stroke:#ef5350;stroke-width:2;fill:none;stroke-dasharray:10 10;animation:flowDown 1s linear infinite}
.edge-upstream{stroke:#42a5f5;stroke-width:2;fill:none;stroke-dasharray:10 10;animation:flowUp 1s linear infinite}
.legend{display:flex;gap:20px;padding:12px 20px;border-top:1px solid var(--fluent-border-subtle);font-size:11px;color:var(--fluent-text-secondary);flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-icon{font-size:16px}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);text-align:right;font-size:10px;color:var(--fluent-text-tertiary)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header"><div class="widget-icon">💥</div><div class="widget-title"><h2>Blast Radius</h2><p id="subtitle">ServiceNow · Dependency Graph</p></div></div>
  <div class="graph-area"><svg class="graph-svg" id="graph"></svg></div>
  <div class="legend">
    <div class="legend-item"><span class="legend-icon">🔴</span> Central CI (impacted)</div>
    <div class="legend-item"><span class="legend-icon">🔵</span> Upstream (feeds into)</div>
    <div class="legend-item"><span class="legend-icon">🟠</span> Downstream (depends on)</div>
    <div class="legend-item"><svg width="40" height="12"><line x1="0" y1="6" x2="40" y2="6" class="edge-downstream" style="animation:none;stroke-dasharray:6 4"/></svg> Downstream flow</div>
    <div class="legend-item"><svg width="40" height="12"><line x1="0" y1="6" x2="40" y2="6" class="edge-upstream" style="animation:none;stroke-dasharray:6 4"/></svg> Upstream flow</div>
  </div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var graph=to.graph||{nodes:[],edges:[]};
var si=to.snowInstance||'';
var central=graph.nodes.find(function(n){return n.isCentral})||graph.nodes[0]||{};
document.getElementById('subtitle').textContent='ServiceNow · '+(central.name||'CI Dependencies');
function getIcon(name,cls){
var n=(name||'').toLowerCase();var c=(cls||'').toLowerCase();
if(c.includes('server')||n.includes('server'))return'🖥️';
if(c.includes('app')||n.includes('app')||n.includes('application'))return'📱';
if(c.includes('database')||c.includes('db')||n.includes('oracle')||n.includes('mysql')||n.includes('sql'))return'🗄️';
if(c.includes('network')||n.includes('switch')||n.includes('router')||n.includes('firewall'))return'🌐';
if(c.includes('workstation')||c.includes('desktop')||c.includes('laptop'))return'💻';
if(n.includes('web')||n.includes('http'))return'🌍';
if(n.includes('mail')||n.includes('email')||n.includes('exchange'))return'📧';
if(n.includes('storage')||n.includes('nas')||n.includes('san'))return'💾';
if(n.includes('load')||n.includes('balancer'))return'⚖️';
return'🔧';}
var svg=document.getElementById('graph');var W=svg.clientWidth||800;var H=400;
svg.setAttribute('viewBox','0 0 '+W+' '+H);
var nodes=graph.nodes;var edges=graph.edges;
var cx=W/2;var cy=H/2;var radius=Math.min(W,H)*0.32;
var positions={};
var nonCentral=nodes.filter(function(n){return!n.isCentral});
for(var i=0;i<nodes.length;i++){var n=nodes[i];
if(n.isCentral){positions[n.id]={x:cx,y:cy};}
else{var idx=nonCentral.indexOf(n);var angle=(2*Math.PI*idx)/Math.max(nonCentral.length,1)-Math.PI/2;
positions[n.id]={x:cx+radius*Math.cos(angle),y:cy+radius*Math.sin(angle)};}}
var edgeSvg='';
for(var i=0;i<edges.length;i++){var e=edges[i];var from=positions[e.source]||positions[e.from];var to2=positions[e.target]||positions[e.to];
if(!from||!to2)continue;var cls=e.direction==='upstream'?'edge-upstream':'edge-downstream';
var dx=to2.x-from.x;var dy=to2.y-from.y;var len=Math.sqrt(dx*dx+dy*dy);
var ux=dx/len;var uy=dy/len;var offset=30;
edgeSvg+='<line class="'+cls+'" x1="'+(from.x+ux*offset)+'" y1="'+(from.y+uy*offset)+'" x2="'+(to2.x-ux*offset)+'" y2="'+(to2.y-uy*offset)+'"/>';}
var nodeSvg='';
for(var i=0;i<nodes.length;i++){var n=nodes[i];var pos=positions[n.id];if(!pos)continue;
var icon=getIcon(n.name,n.sys_class_name);
var isDown=edges.some(function(e){return(e.target===n.id||e.to===n.id)&&e.direction==='downstream'});
var bgColor=n.isCentral?'#ffcdd2':isDown?'#ffe0b2':'#bbdefb';
var borderColor=n.isCentral?'#e53935':isDown?'#e65100':'#1565c0';
var sz=n.isCentral?32:26;
var link=si+'/nav_to.do?uri=cmdb_ci.do?sys_id='+(n.sys_id||n.id||'');
var lblCls=n.isCentral?'node-label node-label-central':'node-label';
nodeSvg+='<g class="node" onclick="window.open(\''+link+'\',\'_blank\')" role="button" tabindex="0">'+
'<circle class="node-bg" cx="'+pos.x+'" cy="'+pos.y+'" r="'+sz+'" fill="'+bgColor+'" stroke="'+borderColor+'" stroke-width="2"/>'+
'<text class="node-icon" x="'+pos.x+'" y="'+(pos.y+5)+'" text-anchor="middle" font-size="'+(n.isCentral?24:20)+'">'+icon+'</text>'+
'<text class="'+lblCls+'" x="'+pos.x+'" y="'+(pos.y+sz+16)+'" text-anchor="middle">'+(n.name||n.id)+'</text></g>';}
svg.innerHTML=edgeSvg+nodeSvg;
var ds=edges.filter(function(e){return e.direction==='downstream'}).length;
var us=edges.filter(function(e){return e.direction==='upstream'}).length;
document.getElementById('footer').textContent=nodes.length+' systems · '+ds+' downstream · '+us+' upstream dependencies';
</script>
</body></html>
