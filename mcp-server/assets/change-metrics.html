<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Metrics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fluent-bg-primary:#ffffff;--fluent-bg-secondary:#f5f5f5;--fluent-bg-tertiary:#fafafa;--fluent-bg-hover:#f0f0f0;
  --fluent-text-primary:#242424;--fluent-text-secondary:#616161;--fluent-text-tertiary:#9e9e9e;
  --fluent-border:#e0e0e0;--fluent-border-subtle:#f0f0f0;
  --fluent-brand-primary:#0f6cbd;--fluent-brand-hover:#115ea3;--fluent-brand-bg:#eff6fc;
  --fluent-success:#0e700e;--fluent-success-bg:#f1faf1;--fluent-warning:#bc4b09;--fluent-warning-bg:#fff9f5;
  --fluent-danger:#b10e1c;--fluent-danger-bg:#fdf3f4;--fluent-info:#0078d4;--fluent-info-bg:#f0f6ff;
  --fluent-overlay:rgba(0,0,0,0.4);
  --fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.04);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.08);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --fluent-radius-sm:4px;--fluent-radius-md:8px;--fluent-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --fluent-bg-primary:#1f1f1f;--fluent-bg-secondary:#2d2d2d;--fluent-bg-tertiary:#383838;--fluent-bg-hover:#404040;
    --fluent-text-primary:#e0e0e0;--fluent-text-secondary:#ababab;--fluent-text-tertiary:#787878;
    --fluent-border:#404040;--fluent-border-subtle:#333333;
    --fluent-brand-primary:#479ef5;--fluent-brand-hover:#62abf5;--fluent-brand-bg:#082338;
    --fluent-success:#54b054;--fluent-success-bg:#052505;--fluent-warning:#f7a648;--fluent-warning-bg:#3d1d00;
    --fluent-danger:#e87979;--fluent-danger-bg:#3b0509;--fluent-info:#62abf5;--fluent-info-bg:#001d3a;
    --fluent-overlay:rgba(0,0,0,0.6);
    --fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.2);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.28);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.36);
  }
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fluent-bg-secondary);color:var(--fluent-text-primary);padding:20px;line-height:1.5}
.widget{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);border:1px solid var(--fluent-border);overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-radius-md);background:var(--fluent-success-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600}.widget-title p{font-size:12px;color:var(--fluent-text-secondary)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--fluent-border-subtle);border-bottom:1px solid var(--fluent-border-subtle)}
.kpi{background:var(--fluent-bg-primary);padding:16px 12px;text-align:center}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.charts{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:10px;padding:16px}
.chart-card h3{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--fluent-text-secondary);width:80px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:20px;background:var(--fluent-border);border-radius:var(--fluent-radius-sm);overflow:hidden}
.bar-fill{height:100%;border-radius:var(--fluent-radius-sm);display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:600;min-width:24px;transition:width .3s}
.outcomes{display:flex;flex-direction:column;gap:8px}
.outcome-row{display:flex;align-items:center;gap:10px;font-size:12px}
.outcome-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.outcome-label{flex:1;color:var(--fluent-text-primary)}.outcome-val{font-weight:600;color:var(--fluent-text-primary)}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);text-align:right;font-size:10px;color:var(--fluent-text-tertiary)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header"><div class="widget-icon">📈</div><div class="widget-title"><h2>Change Management KPIs</h2><p>ServiceNow · Performance Metrics</p></div></div>
  <div class="kpis" id="kpis"></div>
  <div class="charts" id="charts"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var m=to.metrics||to;
var sr=m.successRate||0;var srColor=sr>=90?'#2e7d32':sr>=75?'#e65100':'#c62828';
var emPct=m.emergencyPct||0;var emColor=emPct<=5?'#2e7d32':emPct<=10?'#e65100':'#c62828';
document.getElementById('kpis').innerHTML=
'<div class="kpi"><div class="val" style="color:'+srColor+'">'+sr+'%</div><div class="lbl">Success Rate</div></div>'+
'<div class="kpi"><div class="val" style="color:'+emColor+'">'+emPct+'%</div><div class="lbl">Emergency Changes</div></div>'+
'<div class="kpi"><div class="val" style="color:#1565c0">'+(m.openCount||m.totalOpen||0)+'</div><div class="lbl">Open Pipeline</div></div>'+
'<div class="kpi"><div class="val" style="color:#616161">'+(m.avgDaysOpen||m.avgAge||0)+'d</div><div class="lbl">Avg Age</div></div>';
// byState is an array of {state,count}
var byState=m.byState||[];var byType=m.byType||[];var byRisk=m.byRisk||[];
var stateColors={New:'#42a5f5',Assess:'#ffb74d',Authorize:'#ab47bc',Scheduled:'#26a69a',Implement:'#5c6bc0',Review:'#8d6e63',Closed:'#78909c',Canceled:'#ef5350'};
var typeColors={Normal:'#42a5f5',Standard:'#66bb6a',Emergency:'#ef5350'};
var riskColors={Low:'#66bb6a',Moderate:'#ffb74d',High:'#ef5350',None:'#bdbdbd'};
function buildBars(arr,keyField,valField,colorMap){
var maxVal=1;for(var i=0;i<arr.length;i++){var v=arr[i][valField]||0;if(v>maxVal)maxVal=v;}
var html='';for(var i=0;i<arr.length;i++){var item=arr[i];var k=item[keyField]||'Unknown';var v=item[valField]||0;
var pct=Math.round(v/maxVal*100);var col=colorMap[k]||'#90a4ae';
html+='<div class="bar-row"><span class="bar-label">'+k+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'">'+v+'</div></div></div>';}
return html;}
var stateHtml=buildBars(byState,'state','count',stateColors);
var typeHtml=buildBars(byType,'type','count',typeColors);
var riskHtml=buildBars(byRisk,'risk','count',riskColors);
// Outcomes
var outHtml='';
var successful=m.successful||0;var totalClosed=m.totalClosed||0;var unsuccessful=totalClosed-successful;
var outColors={Successful:'#66bb6a',Unsuccessful:'#ef5350'};
outHtml+='<div class="outcome-row"><div class="outcome-dot" style="background:#66bb6a"></div><span class="outcome-label">Successful</span><span class="outcome-val">'+successful+'</span></div>';
outHtml+='<div class="outcome-row"><div class="outcome-dot" style="background:#ef5350"></div><span class="outcome-label">Unsuccessful</span><span class="outcome-val">'+unsuccessful+'</span></div>';
outHtml+='<div class="outcome-row"><div class="outcome-dot" style="background:#bdbdbd"></div><span class="outcome-label">Total Closed</span><span class="outcome-val">'+totalClosed+'</span></div>';
document.getElementById('charts').innerHTML=
'<div class="chart-card"><h3>By State</h3>'+(stateHtml||'<div style="color:var(--fluent-text-tertiary);font-size:12px">No data</div>')+'</div>'+
'<div class="chart-card"><h3>By Type (ITIL)</h3>'+(typeHtml||'<div style="color:var(--fluent-text-tertiary);font-size:12px">No data</div>')+'</div>'+
'<div class="chart-card"><h3>By Risk Level</h3>'+(riskHtml||'<div style="color:var(--fluent-text-tertiary);font-size:12px">No data</div>')+'</div>'+
'<div class="chart-card"><h3>Outcomes</h3><div class="outcomes">'+outHtml+'</div></div>';
document.getElementById('footer').textContent='Change Management KPIs · '+sr+'% success rate across '+totalClosed+' closed changes · Data from ServiceNow';
</script>
</body></html>
