<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Estate Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
 --bg:#fff;--bg2:#f7f7f8;--bg3:#fafafa;
 --tx:#242424;--tx2:#616161;--tx3:#9e9e9e;
 --br:#e1e1e1;--brSub:#f0f0f0;
 --brand:#0f6cbd;--brandBg:#eff6fc;
 --ok:#0e700e;--okBg:#f1faf1;
 --warn:#bc4b09;--warnBg:#fff9f5;
 --danger:#b10e1c;--dangerBg:#fdf3f4;
 --critical:#9c27b0;--criticalBg:#f5e9f7;
 --info:#0078d4;--infoBg:#f0f6ff;
 --shadow:0 1px 2px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
 --r:8px;--rLg:12px;
 --gradOk:linear-gradient(135deg,#f1faf1,#dcefdc);
 --gradWarn:linear-gradient(135deg,#fff9f5,#ffeed8);
 --gradDanger:linear-gradient(135deg,#fdf3f4,#fbdee2);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#1f1f1f;--bg2:#262626;--bg3:#2d2d2d;
  --tx:#e8e8e8;--tx2:#b0b0b0;--tx3:#7a7a7a;
  --br:#3a3a3a;--brSub:#2f2f2f;
  --brand:#479ef5;--brandBg:#082338;
  --ok:#54b054;--okBg:#0e2d10;--warn:#f7a648;--warnBg:#3d1d00;--danger:#e87979;--dangerBg:#3b0509;--critical:#d586e0;--criticalBg:#2d0e35;
  --shadow:0 2px 6px rgba(0,0,0,.4);
  --gradOk:linear-gradient(135deg,#0e2d10,#1c4520);
  --gradWarn:linear-gradient(135deg,#3d1d00,#5a2c00);
  --gradDanger:linear-gradient(135deg,#3b0509,#580a13);
}}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg2);color:var(--tx);padding:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
.brand-bar{height:4px;background:linear-gradient(90deg,#0f6cbd 0,#479ef5 50%,#0f6cbd 100%);border-radius:4px 4px 0 0}
.widget{max-width:1180px;margin:0 auto;background:var(--bg);border:1px solid var(--br);border-radius:var(--rLg);overflow:hidden;box-shadow:var(--shadow)}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--brSub)}
.hdr-icon{width:36px;height:36px;border-radius:var(--r);background:var(--brandBg);color:var(--brand);display:flex;align-items:center;justify-content:center}
.hdr-icon svg{width:20px;height:20px}
.hdr h1{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--tx2)}
.wordmark{margin-left:auto;color:var(--tx3);opacity:.7}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:14px 18px;background:var(--bg)}
.kpi{padding:14px 16px;border-radius:var(--rLg);border:1px solid var(--br);transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi.tone-ok{background:var(--gradOk)}
.kpi.tone-warn{background:var(--gradWarn)}
.kpi.tone-danger{background:var(--gradDanger);box-shadow:0 0 16px rgba(177,14,28,.25)}
.kpi-label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.kpi-label svg{width:13px;height:13px}
.kpi-num{font-size:36px;font-weight:700;line-height:1;letter-spacing:-.8px;margin:6px 0;font-variant-numeric:tabular-nums}
.kpi.tone-ok .kpi-num{color:var(--ok)}.kpi.tone-warn .kpi-num{color:var(--warn)}.kpi.tone-danger .kpi-num{color:var(--danger)}
.kpi-spark{display:block;height:20px;width:60px;opacity:.85}
.kpi-foot{font-size:10px;color:var(--tx2);margin-top:3px}
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:6px 20px 0;font-size:11px;color:var(--tx2);align-items:center}
.legend strong{color:var(--tx)}
.legend-chip{display:inline-flex;align-items:center;gap:5px}
.legend-chip i{width:10px;height:10px;border-radius:2px;display:inline-block}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px}
.tbtn{padding:5px 10px;border:1px solid var(--br);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--tx);transition:all .12s}
.tbtn:hover{border-color:var(--brand);color:var(--brand);background:var(--brandBg)}
.tbtn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:4px;padding:10px 20px 16px}
.cell{aspect-ratio:1;border-radius:5px;cursor:pointer;position:relative;transition:transform .12s,box-shadow .12s,outline .12s;display:flex;align-items:flex-end;justify-content:flex-start;padding:4px;outline:1px solid transparent}
.cell:hover{transform:scale(1.06);outline:2px solid var(--brand);z-index:5;box-shadow:var(--shadow)}
.cell .lbl{font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell.tier1{outline:2px solid rgba(0,0,0,.18)}
.cell-h-ok{background:linear-gradient(135deg,#56b65a,#2f8a35)}
.cell-h-warn{background:linear-gradient(135deg,#ec9a3f,#bc4b09)}
.cell-h-danger{background:linear-gradient(135deg,#e34b5a,#9c0c1a);box-shadow:inset 0 0 10px rgba(0,0,0,.2)}
.cell-h-crit{background:linear-gradient(135deg,#c354d3,#7c1c8a);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(156,39,176,.4)}50%{box-shadow:0 0 0 5px rgba(156,39,176,0)}}
@media (prefers-reduced-motion:reduce){.cell-h-crit{animation:none}}
.tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg);color:var(--tx);border:1px solid var(--br);border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.4;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:var(--shadow);z-index:10;max-width:240px;white-space:normal}
.cell:hover .tooltip{opacity:1}
.tooltip strong{display:block;font-size:12px;color:var(--tx);margin-bottom:3px}
.tooltip .row{color:var(--tx2);display:flex;justify-content:space-between;gap:10px}
.empty{padding:48px 20px;text-align:center;color:var(--tx2)}
.empty svg{width:48px;height:48px;margin-bottom:10px;color:var(--ok)}
.empty h4{font-size:14px;font-weight:600;margin-bottom:4px}
.empty p{font-size:12px;color:var(--tx3)}
.foot{padding:10px 20px;border-top:1px solid var(--brSub);font-size:10px;color:var(--tx3);background:var(--bg3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="brand-bar" aria-hidden="true"></div>
<div class="widget" role="region" aria-label="Estate Heatmap">
 <div class="hdr">
  <div class="hdr-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="1.5" width="4" height="4" rx="0.5"/><rect x="6.5" y="1.5" width="4" height="4" rx="0.5"/><rect x="11.5" y="1.5" width="3" height="4" rx="0.5"/><rect x="1.5" y="6.5" width="4" height="4" rx="0.5"/><rect x="6.5" y="6.5" width="4" height="4" rx="0.5"/><rect x="11.5" y="6.5" width="3" height="4" rx="0.5"/><rect x="1.5" y="11.5" width="4" height="3" rx="0.5"/><rect x="6.5" y="11.5" width="4" height="3" rx="0.5"/><rect x="11.5" y="11.5" width="3" height="3" rx="0.5"/></svg></div>
  <div><h1>Estate Health Heatmap</h1><div class="hdr-sub" id="ts">—</div></div>
  <div class="wordmark"><svg viewBox="0 0 110 14" aria-hidden="true" style="height:12px"><text x="0" y="11" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="700" fill="currentColor">ITSM Operations</text></svg></div>
 </div>
 <div class="kpi-row" id="kpis"></div>
 <div class="legend">
  <span class="legend-chip"><i style="background:linear-gradient(135deg,#56b65a,#2f8a35)"></i>Healthy</span>
  <span class="legend-chip"><i style="background:linear-gradient(135deg,#ec9a3f,#bc4b09)"></i>Degraded</span>
  <span class="legend-chip"><i style="background:linear-gradient(135deg,#e34b5a,#9c0c1a)"></i>At risk</span>
  <span class="legend-chip"><i style="background:linear-gradient(135deg,#c354d3,#7c1c8a)"></i>Critical</span>
  <span style="margin-left:auto"><strong id="ci-count">0</strong> CIs · sized by criticality</span>
 </div>
 <div class="toolbar" id="tier-filter"></div>
 <div class="grid" id="grid"></div>
 <div class="foot">
  <span>ITSM Operations · CMDB live · hover for incident count + last change</span>
  <span id="foot-ts">—</span>
 </div>
</div>
<script>
var d=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
var tsRaw=d.generatedAt?new Date(d.generatedAt):new Date();
var tsFmt=tsRaw.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
document.getElementById('ts').textContent='ServiceNow · '+tsFmt;
document.getElementById('foot-ts').textContent='Generated '+tsFmt;

function spark(values,color){
 if(!values||!values.length)values=[1,1,1,1,1,1,1,1];
 var max=Math.max.apply(null,values),min=Math.min.apply(null,values);
 var range=max-min||1;var w=60,h=20;
 var pts=values.map(function(v,i){var x=(i/(values.length-1))*w;var y=h-((v-min)/range)*(h-2)-1;return x.toFixed(1)+','+y.toFixed(1)}).join(' ');
 return '<svg class="kpi-spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function countUp(el){
 var t=parseFloat(el.getAttribute('data-target')||'0');if(reduce||t===0){el.textContent=String(t);return}
 var start=0,t0=performance.now();function step(now){var p=Math.min(1,(now-t0)/900);el.textContent=String(Math.round(start+(t-start)*(1-Math.pow(1-p,3))));if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step);
}

// KPIs
var k=d.kpis||{healthy:0,degraded:0,atRisk:0,critical:0};
var kpiCfg=[
 {label:'Healthy',v:k.healthy||0,tone:'ok',color:'#0e700e',trend:k.healthyTrend||[]},
 {label:'Degraded',v:k.degraded||0,tone:'warn',color:'#bc4b09',trend:k.degradedTrend||[]},
 {label:'At risk',v:k.atRisk||0,tone:'danger',color:'#b10e1c',trend:k.atRiskTrend||[]},
 {label:'Critical',v:k.critical||0,tone:'danger',color:'#9c27b0',trend:k.criticalTrend||[]}
];
var kpiEl=document.getElementById('kpis');
kpiCfg.forEach(function(c){
 var div=document.createElement('div');div.className='kpi tone-'+c.tone;
 div.innerHTML='<div class="kpi-label"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="1.5" width="4" height="4" rx="0.5"/><rect x="6.5" y="1.5" width="4" height="4" rx="0.5"/><rect x="11.5" y="1.5" width="3" height="4" rx="0.5"/><rect x="1.5" y="6.5" width="4" height="4" rx="0.5"/><rect x="6.5" y="6.5" width="4" height="4" rx="0.5"/><rect x="11.5" y="6.5" width="3" height="4" rx="0.5"/><rect x="1.5" y="11.5" width="4" height="3" rx="0.5"/><rect x="6.5" y="11.5" width="4" height="3" rx="0.5"/><rect x="11.5" y="11.5" width="3" height="3" rx="0.5"/></svg><span>'+c.label+'</span></div>'+
  '<div class="kpi-num" data-target="'+c.v+'">0</div>'+spark(c.trend,c.color)+
  '<div class="kpi-foot">last 24h trend</div>';
 kpiEl.appendChild(div);
});
document.querySelectorAll('.kpi-num').forEach(countUp);

// CIs
var cis=(d.cis||[]).slice();
document.getElementById('ci-count').textContent=cis.length;
var tiers={};cis.forEach(function(ci){var t=ci.tier||'tier3';tiers[t]=(tiers[t]||0)+1});
var tFilter=document.getElementById('tier-filter');
var btnAll=document.createElement('button');btnAll.className='tbtn active';btnAll.textContent='All ('+cis.length+')';
btnAll.addEventListener('click',function(){renderGrid('all');setActive(btnAll)});tFilter.appendChild(btnAll);
['tier1','tier2','tier3'].forEach(function(t){
 if(!tiers[t])return;
 var b=document.createElement('button');b.className='tbtn';b.textContent=t.replace('tier','Tier ')+' ('+tiers[t]+')';
 b.addEventListener('click',function(){renderGrid(t);setActive(b)});tFilter.appendChild(b);
});
function setActive(btn){tFilter.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active')}

function healthClass(s){return s==='critical'?'cell-h-crit':s==='at-risk'?'cell-h-danger':s==='degraded'?'cell-h-warn':'cell-h-ok'}
function renderGrid(filter){
 var g=document.getElementById('grid');g.innerHTML='';
 var list=filter==='all'?cis:cis.filter(function(c){return(c.tier||'tier3')===filter});
 if(list.length===0){
  g.innerHTML='<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8.2 6.5 11.7 13 4.5"/></svg><h4>No CIs match.</h4><p>Try a different tier filter.</p></div>';
  return;
 }
 // Sort by criticality desc then health desc (most painful first)
 var rank={critical:4,'at-risk':3,degraded:2,healthy:1};
 list.sort(function(a,b){return (rank[b.health||'healthy']||0)-(rank[a.health||'healthy']||0)});
 list.slice(0,300).forEach(function(ci){
  var size=ci.tier==='tier1'?2:1;
  var cell=document.createElement('div');
  cell.className='cell '+healthClass(ci.health||'healthy')+(ci.tier==='tier1'?' tier1':'');
  cell.style.gridColumn='span '+size;cell.style.gridRow='span '+size;
  cell.innerHTML='<span class="lbl">'+escapeHtml((ci.name||'CI').slice(0,16))+'</span>'+
   '<div class="tooltip"><strong>'+escapeHtml(ci.name||'')+'</strong>'+
   '<div class="row"><span>Class</span><span>'+escapeHtml(ci.ciClass||'unknown')+'</span></div>'+
   '<div class="row"><span>Tier</span><span>'+(ci.tier||'tier3').toUpperCase()+'</span></div>'+
   '<div class="row"><span>Health</span><span style="text-transform:capitalize">'+escapeHtml(ci.health||'healthy')+'</span></div>'+
   '<div class="row"><span>Active incidents</span><span>'+(ci.activeIncidents||0)+'</span></div>'+
   (ci.lastChange?'<div class="row"><span>Last change</span><span>'+escapeHtml(ci.lastChange)+'</span></div>':'')+'</div>';
  if(ci.name){cell.addEventListener('click',function(){window.openai&&window.openai.sendFollowUp&&window.openai.sendFollowUp({prompt:'Show me the blast radius for '+ci.name})})}
  g.appendChild(cell);
 });
 if(list.length>300){
  var more=document.createElement('div');more.className='empty';more.style.gridColumn='1/-1';
  more.innerHTML='<p style="margin-top:4px">Showing 300 of '+list.length+' CIs (treemap fallback). Filter by Tier 1 to drill in.</p>';
  g.appendChild(more);
 }
}
renderGrid('all');
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
</script>
</body>
</html>
