name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  MCP_ACR_NAME: ${{ vars.MCP_ACR_NAME }}
  MCP_ACR_LOGIN_SERVER: ${{ vars.MCP_ACR_LOGIN_SERVER }}
  MCP_RESOURCE_GROUP: ${{ vars.MCP_RESOURCE_GROUP }}
  DW_CONTAINER_APP: ${{ vars.DW_CONTAINER_APP_NAME }}
  MCP_CONTAINER_APP: ${{ vars.MCP_CONTAINER_APP_NAME }}
  ENRICHMENT_CONTAINER_APP: ${{ vars.ENRICHMENT_CONTAINER_APP_NAME || 'itsm-mcp-enrichment' }}
  ENRICHMENT_RESOURCE_GROUP: ${{ vars.ENRICHMENT_RESOURCE_GROUP || vars.MCP_RESOURCE_GROUP }}
  ENRICHMENT_ACR_NAME: ${{ vars.ENRICHMENT_ACR_NAME || vars.MCP_ACR_NAME }}
  ENRICHMENT_ACR_LOGIN_SERVER: ${{ vars.ENRICHMENT_ACR_LOGIN_SERVER || vars.MCP_ACR_LOGIN_SERVER }}
  FUNCTIONS_APP: ${{ vars.FUNCTIONS_APP_NAME || format('itsm-ops-{0}-func', github.event.inputs.environment || 'prod') }}
  FUNCTIONS_RESOURCE_GROUP: ${{ vars.FUNCTIONS_RESOURCE_GROUP || vars.AZURE_RESOURCE_GROUP }}

jobs:
  # ── Build & Push Images ────────────────────────────────────────
  build-push:
    name: Build & push Docker images
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      dw-image: ${{ steps.tags.outputs.dw }}
      mcp-image: ${{ steps.tags.outputs.mcp }}
      enrichment-image: ${{ steps.tags.outputs.enrichment }}
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          az acr login --name ${{ env.MCP_ACR_NAME }}
          if [ "${{ env.ENRICHMENT_ACR_NAME }}" != "${{ env.MCP_ACR_NAME }}" ] && [ "${{ env.ENRICHMENT_ACR_NAME }}" != "${{ env.ACR_NAME }}" ]; then
            az acr login --name ${{ env.ENRICHMENT_ACR_NAME }}
          fi

      - name: Generate image tags
        id: tags
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "dw=${{ env.ACR_LOGIN_SERVER }}/itsm-worker:${SHA}" >> $GITHUB_OUTPUT
          echo "mcp=${{ env.MCP_ACR_LOGIN_SERVER }}/itsm-mcp-server:${SHA}" >> $GITHUB_OUTPUT
          echo "enrichment=${{ env.ENRICHMENT_ACR_LOGIN_SERVER }}/itsm-mcp-enrichment:${SHA}" >> $GITHUB_OUTPUT

      - name: Build & push digital-worker
        run: |
          docker build \
            --build-arg GIT_COMMIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ steps.tags.outputs.dw }} digital-worker/
          docker push ${{ steps.tags.outputs.dw }}

      - name: Build & push mcp-server
        run: |
          docker build -t ${{ steps.tags.outputs.mcp }} mcp-server/
          docker push ${{ steps.tags.outputs.mcp }}

      - name: Build & push mcp-server-enrichment
        run: |
          docker build -t ${{ steps.tags.outputs.enrichment }} mcp-server-enrichment/
          docker push ${{ steps.tags.outputs.enrichment }}

  # ── Deploy to Container Apps ───────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    needs: build-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy digital-worker
        run: |
          az containerapp update \
            --name ${{ env.DW_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.build-push.outputs.dw-image }}

      - name: Configure digital-worker runtime settings
        shell: bash
        env:
          AGENT_EMAIL: ${{ vars.AGENT_EMAIL }}
          MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
          GRAPH_MAIL_SENDER: ${{ vars.GRAPH_MAIL_SENDER }}
          GRAPH_APP_ID: ${{ vars.GRAPH_APP_ID }}
          GRAPH_APP_SECRET: ${{ secrets.GRAPH_APP_SECRET }}
          GRAPH_TENANT_ID: ${{ vars.GRAPH_TENANT_ID || secrets.AZURE_TENANT_ID }}
          ITSM_TEAM_ID: ${{ vars.ITSM_TEAM_ID }}
          ITSM_ALERTS_CHANNEL_ID: ${{ vars.ITSM_ALERTS_CHANNEL_ID }}
          ROUTINE_REPORT_RECIPIENTS: ${{ vars.ROUTINE_REPORT_RECIPIENTS }}
          SCHEDULED_SECRET: ${{ secrets.SCHEDULED_SECRET }}
        run: |
          ENV_ARGS=()

          add_env() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              ENV_ARGS+=("${key}=${value}")
            fi
          }

          add_env "AGENT_EMAIL" "$AGENT_EMAIL"
          add_env "MANAGER_EMAIL" "$MANAGER_EMAIL"
          add_env "GRAPH_MAIL_SENDER" "$GRAPH_MAIL_SENDER"
          add_env "GRAPH_APP_ID" "$GRAPH_APP_ID"
          add_env "GRAPH_APP_SECRET" "$GRAPH_APP_SECRET"
          add_env "GRAPH_TENANT_ID" "$GRAPH_TENANT_ID"
          add_env "ITSM_TEAM_ID" "$ITSM_TEAM_ID"
          add_env "ITSM_ALERTS_CHANNEL_ID" "$ITSM_ALERTS_CHANNEL_ID"
          add_env "ROUTINE_REPORT_RECIPIENTS" "$ROUTINE_REPORT_RECIPIENTS"
          add_env "SCHEDULED_SECRET" "$SCHEDULED_SECRET"
          # Always enable proactive engagement so HITL Adaptive Cards are
          # actually posted to the operator's Teams 1:1 chat instead of
          # being silently dropped on the floor.
          add_env "PROACTIVE_ENGAGEMENT_ENABLED" "true"

          if [ ${#ENV_ARGS[@]} -eq 0 ]; then
            echo "No optional digital-worker runtime settings supplied via GitHub environment/secrets."
            exit 0
          fi

          az containerapp update \
            --name ${{ env.DW_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "${ENV_ARGS[@]}"

      - name: Deploy mcp-server
        run: |
          az containerapp update \
            --name ${{ env.MCP_CONTAINER_APP }} \
            --resource-group ${{ env.MCP_RESOURCE_GROUP }} \
            --image ${{ needs.build-push.outputs.mcp-image }}

      - name: Configure mcp-server runtime settings
        shell: bash
        env:
          SCHEDULED_SECRET: ${{ secrets.SCHEDULED_SECRET }}
        run: |
          # The new send-email MCP tool proxies through the digital-worker
          # /api/mail/send endpoint, which is gated by SCHEDULED_SECRET.
          # Wire both so chat agents (Alex IT Ops) can email on request.
          DW_URL=$(az containerapp show \
            --name ${{ env.DW_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          if [ -z "$DW_URL" ]; then
            echo "::error::Unable to resolve digital-worker FQDN — mcp-server send-email tool will not work"
            exit 1
          fi

          ENV_ARGS=("WORKER_BASE_URL=https://${DW_URL}" "DIGITAL_WORKER_URL=https://${DW_URL}")
          if [ -n "$SCHEDULED_SECRET" ]; then
            ENV_ARGS+=("SCHEDULED_SECRET=${SCHEDULED_SECRET}")
          fi

          az containerapp update \
            --name ${{ env.MCP_CONTAINER_APP }} \
            --resource-group ${{ env.MCP_RESOURCE_GROUP }} \
            --set-env-vars "${ENV_ARGS[@]}"

      - name: Deploy mcp-server-enrichment (skip if app missing)
        run: |
          if az containerapp show \
               --name ${{ env.ENRICHMENT_CONTAINER_APP }} \
               --resource-group ${{ env.ENRICHMENT_RESOURCE_GROUP }} \
               -o none 2>/dev/null; then
            az containerapp update \
              --name ${{ env.ENRICHMENT_CONTAINER_APP }} \
              --resource-group ${{ env.ENRICHMENT_RESOURCE_GROUP }} \
              --image ${{ needs.build-push.outputs.enrichment-image }}
          else
            echo "::warning::Enrichment Container App ${{ env.ENRICHMENT_CONTAINER_APP }} not found in ${{ env.ENRICHMENT_RESOURCE_GROUP }} — skipping. Bootstrap the Container App once via az CLI to enable automatic deploys."
          fi

      - name: Wire MCP_ENRICHMENT_ENDPOINT into digital-worker
        run: |
          if FQDN=$(az containerapp show \
                      --name ${{ env.ENRICHMENT_CONTAINER_APP }} \
                      --resource-group ${{ env.ENRICHMENT_RESOURCE_GROUP }} \
                      --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null) && [ -n "$FQDN" ]; then
            az containerapp update \
              --name ${{ env.DW_CONTAINER_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --set-env-vars "MCP_ENRICHMENT_ENDPOINT=https://${FQDN}/enrichment/mcp"
          else
            echo "::warning::Enrichment FQDN not resolvable — leaving MCP_ENRICHMENT_ENDPOINT untouched on digital-worker."
          fi

      - name: Health check — digital-worker
        run: |
          DW_URL=$(az containerapp show \
            --name ${{ env.DW_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          curl --fail --retry 5 --retry-delay 10 "https://${DW_URL}/api/health" || exit 1

      - name: Health check — mcp-server
        run: |
          MCP_URL=$(az containerapp show \
            --name ${{ env.MCP_CONTAINER_APP }} \
            --resource-group ${{ env.MCP_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          curl --fail --retry 5 --retry-delay 10 "https://${MCP_URL}/health" || exit 1

      - name: Health check — mcp-server-enrichment (best-effort)
        run: |
          ENR_URL=$(az containerapp show \
            --name ${{ env.ENRICHMENT_CONTAINER_APP }} \
            --resource-group ${{ env.ENRICHMENT_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null) || ENR_URL=""
          if [ -n "$ENR_URL" ]; then
            curl --fail --retry 5 --retry-delay 10 "https://${ENR_URL}/health" || exit 1
          else
            echo "::warning::Enrichment Container App not yet bootstrapped — skipping health check."
          fi

  # ── Deploy to Azure Functions ──────────────────────────────────
  deploy-functions:
    name: Deploy to Azure Functions
    needs: deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Functions
        working-directory: functions
        run: |
          npm ci --include=dev
          npm run build
          # Flex Consumption + v4 programming model: the runtime needs
          # node_modules in the package (no remote Oryx build). Prune dev
          # deps so the zip only ships production runtime dependencies.
          npm prune --omit=dev

      - name: Create deployment package
        working-directory: functions
        run: |
          # Include node_modules so @azure/functions, durable-functions etc.
          # are resolvable at host startup. Exclude only sources/tests/git.
          zip -r ../deploy-functions.zip . \
            -x "*.git*" ".env*" "test/*" "tests/*" "src/*" "tsconfig.json" "vitest.config*"

      - name: Validate Function App target
        run: |
          az functionapp show \
            --resource-group ${{ env.FUNCTIONS_RESOURCE_GROUP }} \
            --name ${{ env.FUNCTIONS_APP }} \
            --query "{name:name,state:state,defaultHostName:defaultHostName}" \
            -o table

      - name: Deploy Functions (config-zip)
        run: |
          az functionapp deployment source config-zip \
            -g ${{ env.FUNCTIONS_RESOURCE_GROUP }} \
            -n ${{ env.FUNCTIONS_APP }} \
            --src deploy-functions.zip \
            --verbose

      - name: Configure Function App runtime settings
        shell: bash
        env:
          SCHEDULED_SECRET: ${{ secrets.SCHEDULED_SECRET }}
        run: |
          DW_URL=$(az containerapp show \
            --name ${{ env.DW_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          if [ -z "$DW_URL" ]; then
            echo "Unable to resolve digital-worker ingress FQDN"
            exit 1
          fi

          APP_SETTINGS=("DIGITAL_WORKER_URL=https://${DW_URL}")

          if [ -n "$SCHEDULED_SECRET" ]; then
            APP_SETTINGS+=("WORKER_SCHEDULED_SECRET=${SCHEDULED_SECRET}")
            APP_SETTINGS+=("SCHEDULED_SECRET=${SCHEDULED_SECRET}")
          fi

          az functionapp config appsettings set \
            --resource-group ${{ env.FUNCTIONS_RESOURCE_GROUP }} \
            --name ${{ env.FUNCTIONS_APP }} \
            --settings "${APP_SETTINGS[@]}"



  # ── Update Teams App (dev only) ────────────────────────────────
  update-teams-app:
    name: Update Teams app package
    needs: deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Container App URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.MCP_CONTAINER_APP }} \
            --resource-group ${{ env.MCP_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "CONTAINER_APP_URL=https://${FQDN}" >> $GITHUB_ENV

      - name: Install Teams Toolkit CLI
        run: npm install -g @microsoft/m365agentstoolkit-cli || npm install -g @microsoft/teamsapp-cli

      - name: Deploy Teams app package
        env:
          TEAMS_APP_TENANT_ID: ${{ secrets.TEAMS_APP_TENANT_ID }}
          M365_ACCOUNT_NAME: ${{ secrets.M365_ACCOUNT_NAME }}
          M365_ACCOUNT_PASSWORD: ${{ secrets.M365_ACCOUNT_PASSWORD }}
        run: teamsapp deploy --env dev
