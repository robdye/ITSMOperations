<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EOL Risk Forecast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--fluent-bg-primary:#ffffff;--fluent-bg-secondary:#f5f5f5;--fluent-bg-tertiary:#fafafa;--fluent-bg-hover:#f0f0f0;--fluent-text-primary:#242424;--fluent-text-secondary:#616161;--fluent-text-tertiary:#9e9e9e;--fluent-border:#e0e0e0;--fluent-border-subtle:#f0f0f0;--fluent-brand-primary:#0f6cbd;--fluent-brand-hover:#115ea3;--fluent-brand-bg:#eff6fc;--fluent-success:#0e700e;--fluent-success-bg:#f1faf1;--fluent-warning:#bc4b09;--fluent-warning-bg:#fff9f5;--fluent-danger:#b10e1c;--fluent-danger-bg:#fdf3f4;--fluent-info:#0078d4;--fluent-info-bg:#f0f6ff;--fluent-overlay:rgba(0,0,0,0.4);--fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.04);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.08);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.14);--fluent-radius-sm:4px;--fluent-radius-md:8px;--fluent-radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--fluent-bg-primary:#1f1f1f;--fluent-bg-secondary:#2d2d2d;--fluent-bg-tertiary:#383838;--fluent-bg-hover:#404040;--fluent-text-primary:#e0e0e0;--fluent-text-secondary:#ababab;--fluent-text-tertiary:#787878;--fluent-border:#404040;--fluent-border-subtle:#333333;--fluent-brand-primary:#479ef5;--fluent-brand-hover:#62abf5;--fluent-brand-bg:#082338;--fluent-success:#54b054;--fluent-success-bg:#052505;--fluent-warning:#f7a648;--fluent-warning-bg:#3d1d00;--fluent-danger:#e87979;--fluent-danger-bg:#3b0509;--fluent-info:#62abf5;--fluent-info-bg:#001d3a;--fluent-overlay:rgba(0,0,0,0.6);--fluent-shadow-sm:0 2px 4px rgba(0,0,0,0.2);--fluent-shadow-md:0 4px 8px rgba(0,0,0,0.28);--fluent-shadow-lg:0 8px 32px rgba(0,0,0,0.36)}}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fluent-bg-secondary);color:var(--fluent-text-primary);padding:20px;line-height:1.5}
.widget{background:var(--fluent-bg-primary);border-radius:var(--fluent-radius-lg);border:1px solid var(--fluent-border);overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--fluent-border-subtle)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-radius-md);background:var(--fluent-warning-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600;color:var(--fluent-text-primary)}
.widget-title p{font-size:12px;color:var(--fluent-text-secondary)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--fluent-bg-hover);border-bottom:1px solid var(--fluent-border-subtle)}
.kpi{background:var(--fluent-bg-primary);padding:16px 12px;text-align:center}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.asset-card{display:grid;grid-template-columns:4px 1fr auto;gap:0;background:var(--fluent-bg-tertiary);border:1px solid var(--fluent-border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s}
.asset-card:hover{border-color:var(--fluent-brand-primary);box-shadow:var(--fluent-shadow-sm)}
.status-bar{border-radius:0}
.asset-body{padding:12px;display:flex;flex-direction:column;gap:4px}
.asset-body h3{font-size:13px;font-weight:600;color:var(--fluent-text-primary)}
.asset-body .meta{font-size:11px;color:var(--fluent-text-secondary)}
.asset-right{padding:12px 16px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px}
.status-tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.st-nc{background:var(--fluent-danger-bg);color:var(--fluent-danger)}.st-ar{background:var(--fluent-warning-bg);color:var(--fluent-warning)}.st-ok{background:var(--fluent-success-bg);color:var(--fluent-success)}
.days-label{font-size:11px;color:var(--fluent-text-secondary)}
.empty{text-align:center;color:var(--fluent-text-tertiary);padding:48px 20px;font-size:14px}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-border-subtle);text-align:right;font-size:10px;color:var(--fluent-text-tertiary)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="widget-icon">📅</div>
    <div class="widget-title"><h2>EOL Risk Forecast</h2><p id="sub">ServiceNow + EndOfLife.date</p></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="list" id="list"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var forecasts=to.forecasts||[];var months=to.months||12;
var nc=forecasts.filter(function(f){return f.eolStatus&&f.eolStatus.status==='non-compliant'}).length;
var ar=forecasts.filter(function(f){return f.eolStatus&&f.eolStatus.status==='at-risk'}).length;
var ok=forecasts.length-nc-ar;
document.getElementById('sub').textContent='ServiceNow + EndOfLife.date · '+months+' month forecast';
document.getElementById('kpis').innerHTML=
'<div class="kpi"><div class="val" style="color:var(--fluent-danger)">'+nc+'</div><div class="lbl">Non-Compliant</div></div>'+
'<div class="kpi"><div class="val" style="color:var(--fluent-warning)">'+ar+'</div><div class="lbl">At Risk</div></div>'+
'<div class="kpi"><div class="val" style="color:var(--fluent-success)">'+ok+'</div><div class="lbl">Supported</div></div>';
var html='';
for(var i=0;i<forecasts.length;i++){var f=forecasts[i];
var status=f.eolStatus?f.eolStatus.status:'supported';
var barColor=status==='non-compliant'?'var(--fluent-danger)':status==='at-risk'?'var(--fluent-warning)':'var(--fluent-success)';
var stCls=status==='non-compliant'?'st-nc':status==='at-risk'?'st-ar':'st-ok';
var stLabel=status==='non-compliant'?'Non-Compliant':status==='at-risk'?'At Risk':'Supported';
var days=f.daysToEol;var daysText=days===null||days===undefined?'—':days<0?Math.abs(days)+' days past EOL':days+' days to EOL';
html+='<div class="asset-card" role="button" tabindex="0">'+
'<div class="status-bar" style="background:'+barColor+'"></div>'+
'<div class="asset-body"><h3>'+(f.ci_name||'Unknown CI')+'</h3>'+
'<div class="meta">'+(f.os||'—')+' · '+(f.environment||'—')+'</div></div>'+
'<div class="asset-right"><span class="status-tag '+stCls+'">'+stLabel+'</span>'+
'<span class="days-label">'+daysText+'</span></div></div>';}
document.getElementById('list').innerHTML=html||'<div class="empty">No EOL data available.</div>';
document.getElementById('footer').textContent=forecasts.length+' asset'+(forecasts.length!==1?'s':'')+' analyzed · Data from ServiceNow + EndOfLife.date';
</script>
</body></html>
