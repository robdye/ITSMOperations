<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Risk Briefing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#242424;padding:20px;line-height:1.5}
.widget{background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #f0f0f0}
.widget-icon{width:36px;height:36px;border-radius:8px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600;color:#242424}
.widget-title p{font-size:12px;color:#616161}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#f0f0f0;border-bottom:1px solid #f0f0f0}
.kpi{background:#fff;padding:16px 12px;text-align:center}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:#616161;margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.sections{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.section{background:#fafafa;border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px}
.section h2{font-size:13px;font-weight:600;color:#242424;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section h2 .ct{background:#e0e0e0;color:#616161;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}
.alert{border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;font-size:12px;background:#fff}
.alert:hover{border-color:#1976d2;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.alert:last-child{margin-bottom:0}
.alert strong{display:block;margin-bottom:2px;font-size:13px}
.alert p{color:#757575;font-size:11px}
.collision-alert{border-left:3px solid #f57f17}.collision-alert strong{color:#f57f17}
.stale-alert{border-left:3px solid #9e9e9e}.stale-alert strong{color:#616161}
.high-risk-alert{border-left:3px solid #d32f2f}.high-risk-alert strong{color:#c62828}
.incident-alert{border-left:3px solid #e65100}.incident-alert strong{color:#e65100}
.reco{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start;font-size:12px;color:#424242}
.reco:last-child{border-bottom:none}
.reco-num{background:#1976d2;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.reco-urgent .reco-num{background:#d32f2f}
.footer{padding:10px 16px;border-top:1px solid #f0f0f0;text-align:right;font-size:10px;color:#bdbdbd}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="widget-icon">⚠️</div>
    <div class="widget-title"><h2>Change Risk Briefing</h2><p id="ts">ServiceNow · Risk Analysis</p></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="sections" id="alerts"></div>
  <div class="section" style="margin:0 16px 12px;background:#fafafa;border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px"><h2 style="font-size:13px;font-weight:600;margin-bottom:10px">Recommendations</h2><div id="recos"></div></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var d=to;var si=d.snowInstance||'';
var ts=d.generatedAt?new Date(d.generatedAt).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
document.getElementById('ts').textContent='ServiceNow · '+ts;
document.getElementById('kpis').innerHTML=
'<div class="kpi"><div class="val" style="color:#f57f17">'+(d.collisionCount||0)+'</div><div class="lbl">Collisions</div></div>'+
'<div class="kpi"><div class="val" style="color:#c62828">'+(d.highRiskCount||0)+'</div><div class="lbl">High Risk</div></div>'+
'<div class="kpi"><div class="val" style="color:#757575">'+(d.staleCount||0)+'</div><div class="lbl">Stale CRs</div></div>'+
'<div class="kpi"><div class="val" style="color:#e65100">'+(d.incidentRiskCount||0)+'</div><div class="lbl">Incident Risk</div></div>';
var html='';
var coll=d.collisions||[];
if(coll.length){html+='<div class="section"><h2>⚠️ Change Collisions <span class="ct">'+coll.length+'</span></h2>';
for(var i=0;i<coll.length;i++){html+='<div class="alert collision-alert"><strong>'+coll[i].title+'</strong><p>'+coll[i].detail+'</p></div>';}html+='</div>';}
var highRisk=d.highRiskChanges||[];
if(highRisk.length){html+='<div class="section"><h2>🔥 High Risk Changes <span class="ct">'+highRisk.length+'</span></h2>';
for(var i=0;i<highRisk.length;i++){var hr=highRisk[i];var link=si+'/nav_to.do?uri=change_request.do?sys_id='+(hr.sys_id||'');
html+='<div class="alert high-risk-alert" onclick="window.open(\''+link+'\',\'_blank\')"><strong>'+(hr.number||'')+' — '+(hr.short_description||'')+'</strong><p>Risk: '+(hr.risk||'')+' · Score: '+(hr.riskScore||'—')+'</p></div>';}html+='</div>';}
var stale=d.staleChanges||[];
if(stale.length){html+='<div class="section"><h2>📋 Stale Changes <span class="ct">'+stale.length+'</span></h2>';
for(var i=0;i<Math.min(stale.length,5);i++){var sc=stale[i];var link=si+'/nav_to.do?uri=change_request.do?sys_id='+(sc.sys_id||'');
html+='<div class="alert stale-alert" onclick="window.open(\''+link+'\',\'_blank\')"><strong>'+(sc.number||'')+' — '+(sc.short_description||'')+'</strong><p>Open '+(sc.daysOpen||0)+' days</p></div>';}html+='</div>';}
var incRisk=d.incidentRisks||[];
if(incRisk.length){html+='<div class="section"><h2>🔴 CIs with Active Incidents <span class="ct">'+incRisk.length+'</span></h2>';
for(var i=0;i<incRisk.length;i++){html+='<div class="alert incident-alert"><strong>'+incRisk[i].title+'</strong><p>'+incRisk[i].detail+'</p></div>';}html+='</div>';}
if(!html)html='<div class="section" style="text-align:center;color:#2e7d32;padding:20px">✅ No change risks detected.</div>';
document.getElementById('alerts').innerHTML=html;
var recos=d.recommendations||[];var rhtml='';
for(var i=0;i<recos.length;i++){var uc=recos[i].urgent?' reco-urgent':'';
rhtml+='<div class="reco'+uc+'"><div class="reco-num">'+(i+1)+'</div><div>'+recos[i].text+'</div></div>';}
document.getElementById('recos').innerHTML=rhtml||'<div style="color:#9e9e9e;font-size:12px">No recommendations.</div>';
document.getElementById('footer').textContent='Generated '+ts+' · Data from ServiceNow';
</script>
</body></html>
