<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Asset Lifecycle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#242424;padding:20px;line-height:1.5}
.widget{background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden;max-width:900px;margin:0 auto}
.widget-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #f0f0f0}
.widget-icon{width:36px;height:36px;border-radius:8px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:16px;font-weight:600}.widget-title p{font-size:12px;color:#616161}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#f0f0f0;border-bottom:1px solid #f0f0f0}
.kpi{background:#fff;padding:16px 12px;text-align:center;cursor:pointer;transition:all .15s;border-bottom:3px solid transparent}
.kpi:hover{background:#fafafa}.kpi.active{border-bottom-color:#1976d2;background:#f5f9ff}
.kpi .val{font-size:24px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:#616161;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.asset-card{display:grid;grid-template-columns:4px 1fr auto;gap:0;background:#fafafa;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s}
.asset-card:hover{border-color:#1976d2;box-shadow:0 2px 8px rgba(25,118,210,.1)}
.asset-body{padding:12px;display:flex;flex-direction:column;gap:4px}
.asset-body h3{font-size:13px;font-weight:600}
.asset-body .meta{font-size:11px;color:#757575}
.asset-right{padding:12px 16px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px}
.status-tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.st-nc{background:#ffebee;color:#c62828}.st-ar{background:#fff3e0;color:#e65100}.st-ok{background:#e8f5e9;color:#2e7d32}
.risk-label{font-size:11px;font-weight:600}
.empty{text-align:center;color:#9e9e9e;padding:48px 20px;font-size:14px}
.footer{padding:10px 16px;border-top:1px solid #f0f0f0;text-align:right;font-size:10px;color:#bdbdbd}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header"><div class="widget-icon">🖥️</div><div class="widget-title"><h2>Asset Lifecycle Dashboard</h2><p>ServiceNow + EndOfLife.date · Compliance Status</p></div></div>
  <div class="kpis" id="kpis"></div>
  <div class="list" id="list"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var allAssets=to.assets||[];var si=to.snowInstance||'';
function getStatus(a){var s=a.eolStatus||a.riskClassification||{};return s.status||'supported';}
function getRiskScore(a){var rs=a.riskScore||{};return rs.score||0;}
function getRiskColor(a){var rs=a.riskScore||{};return rs.color||'#757575';}
var nc=allAssets.filter(function(a){return getStatus(a)==='non-compliant'}).length;
var ar=allAssets.filter(function(a){return getStatus(a)==='at-risk'}).length;
var ok=allAssets.filter(function(a){return getStatus(a)==='supported'}).length;
var activeFilter=null;
function render(filter){
activeFilter=filter;
var filtered=allAssets;
if(filter==='nc')filtered=allAssets.filter(function(a){return getStatus(a)==='non-compliant'});
if(filter==='ar')filtered=allAssets.filter(function(a){return getStatus(a)==='at-risk'});
if(filter==='ok')filtered=allAssets.filter(function(a){return getStatus(a)==='supported'});
var kpiData=[{f:null,val:allAssets.length,lbl:'Total Assets',color:'#1565c0'},{f:'nc',val:nc,lbl:'Non-Compliant',color:'#c62828'},{f:'ar',val:ar,lbl:'At Risk',color:'#e65100'},{f:'ok',val:ok,lbl:'Supported',color:'#2e7d32'}];
var khtml='';
for(var i=0;i<kpiData.length;i++){var k=kpiData[i];var isActive=filter===k.f?' active':'';
khtml+='<div class="kpi'+isActive+'" onclick="render('+(filter===k.f?'null':(k.f===null?'null':"'"+k.f+"'"))+')"><div class="val" style="color:'+k.color+'">'+k.val+'</div><div class="lbl">'+k.lbl+'</div></div>';}
document.getElementById('kpis').innerHTML=khtml;
var html='';
for(var i=0;i<filtered.length;i++){var a=filtered[i];
var status=getStatus(a);var barColor=status==='non-compliant'?'#ef5350':status==='at-risk'?'#ff9800':'#66bb6a';
var stCls=status==='non-compliant'?'st-nc':status==='at-risk'?'st-ar':'st-ok';
var stLabel=status==='non-compliant'?'Non-Compliant':status==='at-risk'?'At Risk':'Supported';
var link=si+'/nav_to.do?uri=cmdb_ci.do?sys_id='+(a.sys_id||'');
var score=getRiskScore(a);var scoreColor=getRiskColor(a);
html+='<div class="asset-card" onclick="window.open(\''+link+'\',\'_blank\')" role="button" tabindex="0">'+
'<div style="background:'+barColor+'"></div>'+
'<div class="asset-body"><h3>'+(a.name||'Unknown')+'</h3>'+
'<div class="meta">'+(a.os||'')+' '+(a.os_version||'')+' · '+(a.environment||'—')+'</div></div>'+
'<div class="asset-right"><span class="status-tag '+stCls+'">'+stLabel+'</span>'+
(score?'<span class="risk-label" style="color:'+scoreColor+'">Risk: '+score+'/25</span>':'')+'</div></div>';}
document.getElementById('list').innerHTML=html||'<div class="empty">No asset data available.</div>';
document.getElementById('footer').textContent='Showing '+filtered.length+' of '+allAssets.length+' asset'+(allAssets.length!==1?'s':'')+' · Data from ServiceNow + EndOfLife.date';}
window.render=render;render(null);
</script>
</body></html>
