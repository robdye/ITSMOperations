<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Schedule Control Panel</title>
<style>
:root {
  --fluent-colorNeutralBackground1: #ffffff;
  --fluent-colorNeutralBackground2: #fafafa;
  --fluent-colorNeutralBackground3: #f5f5f5;
  --fluent-colorNeutralForeground1: #242424;
  --fluent-colorNeutralForeground2: #616161;
  --fluent-colorNeutralForeground3: #9e9e9e;
  --fluent-colorNeutralStroke1: #e0e0e0;
  --fluent-colorBrandBackground: #0f6cbd;
  --fluent-colorBrandForeground1: #0f6cbd;
  --fluent-colorPaletteRedBackground3: #c50f1f;
  --fluent-colorPaletteRedForeground1: #c50f1f;
  --fluent-colorPaletteGreenBackground3: #107c10;
  --fluent-colorPaletteGreenForeground1: #107c10;
  --fluent-colorPaletteYellowBackground3: #f7630c;
  --fluent-colorPaletteYellowForeground1: #f7630c;
  --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.12);
  --fluent-colorNeutralShadowKey: rgba(0,0,0,0.14);
  --fluent-borderRadiusMedium: 8px;
  --fluent-borderRadiusLarge: 12px;
  --fluent-fontFamilyBase: 'Segoe UI', -apple-system, system-ui, sans-serif;
  --fluent-fontSizeBase300: 14px;
  --fluent-fontSizeBase400: 16px;
  --fluent-fontSizeBase500: 20px;
  --fluent-fontSizeBase600: 24px;
  --fluent-fontWeightSemibold: 600;
  --fluent-spacingHorizontalM: 12px;
  --fluent-spacingHorizontalL: 16px;
  --fluent-spacingVerticalM: 12px;
  --fluent-spacingVerticalL: 16px;
  --fluent-shadow4: 0 2px 4px var(--fluent-colorNeutralShadowAmbient), 0 1px 2px var(--fluent-colorNeutralShadowKey);
  --fluent-shadow8: 0 4px 8px var(--fluent-colorNeutralShadowAmbient), 0 2px 4px var(--fluent-colorNeutralShadowKey);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fluent-colorNeutralBackground1: #1f1f1f;
    --fluent-colorNeutralBackground2: #292929;
    --fluent-colorNeutralBackground3: #333333;
    --fluent-colorNeutralForeground1: #ffffff;
    --fluent-colorNeutralForeground2: #d6d6d6;
    --fluent-colorNeutralForeground3: #adadad;
    --fluent-colorNeutralStroke1: #404040;
    --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.24);
    --fluent-colorNeutralShadowKey: rgba(0,0,0,0.28);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fluent-fontFamilyBase);background:var(--fluent-colorNeutralBackground3);color:var(--fluent-colorNeutralForeground1);padding:20px;line-height:1.5}
.widget{background:var(--fluent-colorNeutralBackground1);border-radius:var(--fluent-borderRadiusLarge);border:1px solid var(--fluent-colorNeutralStroke1);overflow:hidden;max-width:960px;margin:0 auto;box-shadow:var(--fluent-shadow8)}
.widget-header{display:flex;align-items:center;gap:10px;padding:var(--fluent-spacingVerticalL) 20px;border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-borderRadiusMedium);background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:var(--fluent-fontSizeBase400);font-weight:var(--fluent-fontWeightSemibold)}
.widget-title p{font-size:12px;color:var(--fluent-colorNeutralForeground2)}
.routine-list{display:flex;flex-direction:column;gap:0}
.routine-card{display:grid;grid-template-columns:48px 1fr auto;gap:0;align-items:center;padding:16px 20px;border-bottom:1px solid var(--fluent-colorNeutralStroke1);transition:background .15s}
.routine-card:hover{background:var(--fluent-colorNeutralBackground2)}
.routine-card:focus{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:-2px}
.status-dot{width:12px;height:12px;border-radius:50%;justify-self:center}
.status-active{background:var(--fluent-colorPaletteGreenBackground3)}.status-paused{background:var(--fluent-colorPaletteYellowBackground3)}.status-failed{background:var(--fluent-colorPaletteRedBackground3)}
.routine-info{display:flex;flex-direction:column;gap:4px}
.routine-name{font-size:var(--fluent-fontSizeBase300);font-weight:var(--fluent-fontWeightSemibold)}
.routine-meta{font-size:12px;color:var(--fluent-colorNeutralForeground2);display:flex;flex-wrap:wrap;gap:12px}
.routine-meta span{display:inline-flex;align-items:center;gap:4px}
.cron-tag{font-family:'Consolas','Courier New',monospace;background:var(--fluent-colorNeutralBackground3);padding:2px 8px;border-radius:4px;font-size:11px;color:var(--fluent-colorNeutralForeground2)}
.routine-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.sparkline{display:flex;align-items:flex-end;gap:2px;height:24px}
.spark-bar{width:6px;border-radius:2px 2px 0 0;transition:height .3s}
.spark-ok{background:var(--fluent-colorPaletteGreenBackground3)}.spark-warn{background:var(--fluent-colorPaletteYellowBackground3)}.spark-fail{background:var(--fluent-colorPaletteRedBackground3)}
.toggle{position:relative;width:44px;height:24px;border-radius:12px;background:var(--fluent-colorNeutralStroke1);cursor:pointer;border:none;transition:background .2s;padding:0}
.toggle.on{background:var(--fluent-colorPaletteGreenBackground3)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:var(--fluent-shadow4)}
.toggle.on::after{transform:translateX(20px)}
.toggle:focus{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:2px}
.empty{text-align:center;color:var(--fluent-colorNeutralForeground3);padding:48px 20px;font-size:var(--fluent-fontSizeBase300)}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-colorNeutralStroke1);text-align:right;font-size:10px;color:var(--fluent-colorNeutralForeground3)}
</style>
</head>
<body>
<div class="widget" role="region" aria-label="Schedule Control Panel">
  <div class="widget-header"><div class="widget-icon">⏱️</div><div class="widget-title"><h2>Schedule Control Panel</h2><p>Routine Execution Management</p></div></div>
  <div class="routine-list" id="routine-list" role="list" aria-label="Scheduled routines"></div>
  <div class="empty" id="empty" style="display:none" role="status">No scheduled routines configured.</div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var routines=to.routines||[];
var nextRuns=to.nextRuns||[];

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

var nextRunMap={};
for(var i=0;i<nextRuns.length;i++){nextRunMap[nextRuns[i].id||nextRuns[i].name]=nextRuns[i].nextRun||nextRuns[i].next||'';}

function buildSparkline(history){
  if(!history||!history.length)return'<div class="sparkline" role="img" aria-label="No run history"></div>';
  var max=0;for(var i=0;i<history.length;i++){var v=typeof history[i]==='object'?(history[i].duration||history[i].value||0):history[i];if(v>max)max=v;}
  var html='<div class="sparkline" role="img" aria-label="Run history sparkline">';
  for(var i=0;i<history.length;i++){
    var item=typeof history[i]==='object'?history[i]:{value:history[i],status:'ok'};
    var v=item.duration||item.value||0;
    var h=max>0?Math.max(4,Math.round((v/max)*24)):4;
    var st=item.status||'ok';
    var cls=st==='fail'||st==='failed'?'spark-fail':st==='warn'||st==='warning'?'spark-warn':'spark-ok';
    html+='<div class="spark-bar '+cls+'" style="height:'+h+'px" title="Run '+(i+1)+': '+v+'ms"></div>';
  }
  html+='</div>';
  return html;
}

var list=document.getElementById('routine-list');
var emptyEl=document.getElementById('empty');

if(routines.length===0){emptyEl.style.display='block';}
else{
  var html='';
  for(var i=0;i<routines.length;i++){
    var r=routines[i];
    var status=(r.status||'active').toLowerCase();
    var statusCls='status-'+status;
    var isOn=status==='active';
    var nextRun=nextRunMap[r.id||r.name]||r.nextRun||r.next||'—';
    html+='<div class="routine-card" role="listitem" tabindex="0" aria-label="'+esc(r.name)+', status: '+status+'">'+
      '<div class="status-dot '+statusCls+'" title="'+esc(status)+'" aria-hidden="true"></div>'+
      '<div class="routine-info">'+
        '<div class="routine-name">'+esc(r.name||'Untitled Routine')+'</div>'+
        '<div class="routine-meta">'+
          '<span><span class="cron-tag">'+esc(r.cron||r.schedule||'')+'</span></span>'+
          '<span>Last: '+esc(r.lastRun||r.lastRunTime||'Never')+'</span>'+
          '<span>Next: '+esc(nextRun)+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="routine-right">'+
        buildSparkline(r.history||r.runHistory||[])+
        '<button class="toggle'+(isOn?' on':'')+'" role="switch" aria-checked="'+isOn+'" aria-label="Toggle '+esc(r.name)+'" onclick="this.classList.toggle(\'on\');this.setAttribute(\'aria-checked\',this.classList.contains(\'on\'))"></button>'+
      '</div>'+
    '</div>';
  }
  list.innerHTML=html;
}

document.getElementById('footer').textContent='Schedule Control · '+routines.length+' routine'+(routines.length!==1?'s':'')+' · '+new Date().toLocaleString();
</script>
</body>
</html>
