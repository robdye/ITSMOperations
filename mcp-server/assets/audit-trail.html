<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Compliance Audit Trail</title>
<style>
:root {
  --fluent-colorNeutralBackground1: #ffffff;
  --fluent-colorNeutralBackground2: #fafafa;
  --fluent-colorNeutralBackground3: #f5f5f5;
  --fluent-colorNeutralForeground1: #242424;
  --fluent-colorNeutralForeground2: #616161;
  --fluent-colorNeutralForeground3: #9e9e9e;
  --fluent-colorNeutralStroke1: #e0e0e0;
  --fluent-colorBrandBackground: #0f6cbd;
  --fluent-colorBrandForeground1: #0f6cbd;
  --fluent-colorPaletteRedBackground3: #c50f1f;
  --fluent-colorPaletteRedForeground1: #c50f1f;
  --fluent-colorPaletteGreenBackground3: #107c10;
  --fluent-colorPaletteGreenForeground1: #107c10;
  --fluent-colorPaletteYellowBackground3: #f7630c;
  --fluent-colorPaletteYellowForeground1: #f7630c;
  --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.12);
  --fluent-colorNeutralShadowKey: rgba(0,0,0,0.14);
  --fluent-borderRadiusMedium: 8px;
  --fluent-borderRadiusLarge: 12px;
  --fluent-fontFamilyBase: 'Segoe UI', -apple-system, system-ui, sans-serif;
  --fluent-fontSizeBase300: 14px;
  --fluent-fontSizeBase400: 16px;
  --fluent-fontSizeBase500: 20px;
  --fluent-fontSizeBase600: 24px;
  --fluent-fontWeightSemibold: 600;
  --fluent-spacingHorizontalM: 12px;
  --fluent-spacingHorizontalL: 16px;
  --fluent-spacingVerticalM: 12px;
  --fluent-spacingVerticalL: 16px;
  --fluent-shadow4: 0 2px 4px var(--fluent-colorNeutralShadowAmbient), 0 1px 2px var(--fluent-colorNeutralShadowKey);
  --fluent-shadow8: 0 4px 8px var(--fluent-colorNeutralShadowAmbient), 0 2px 4px var(--fluent-colorNeutralShadowKey);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fluent-colorNeutralBackground1: #1f1f1f;
    --fluent-colorNeutralBackground2: #292929;
    --fluent-colorNeutralBackground3: #333333;
    --fluent-colorNeutralForeground1: #ffffff;
    --fluent-colorNeutralForeground2: #d6d6d6;
    --fluent-colorNeutralForeground3: #adadad;
    --fluent-colorNeutralStroke1: #404040;
    --fluent-colorNeutralShadowAmbient: rgba(0,0,0,0.24);
    --fluent-colorNeutralShadowKey: rgba(0,0,0,0.28);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fluent-fontFamilyBase);background:var(--fluent-colorNeutralBackground3);color:var(--fluent-colorNeutralForeground1);padding:20px;line-height:1.5}
.widget{background:var(--fluent-colorNeutralBackground1);border-radius:var(--fluent-borderRadiusLarge);border:1px solid var(--fluent-colorNeutralStroke1);overflow:hidden;max-width:1020px;margin:0 auto;box-shadow:var(--fluent-shadow8)}
.widget-header{display:flex;align-items:center;gap:10px;padding:var(--fluent-spacingVerticalL) 20px;border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.widget-icon{width:36px;height:36px;border-radius:var(--fluent-borderRadiusMedium);background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:18px}
.widget-title h2{font-size:var(--fluent-fontSizeBase400);font-weight:var(--fluent-fontWeightSemibold)}
.widget-title p{font-size:12px;color:var(--fluent-colorNeutralForeground2)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--fluent-colorNeutralStroke1);border-bottom:1px solid var(--fluent-colorNeutralStroke1)}
.kpi{background:var(--fluent-colorNeutralBackground1);padding:var(--fluent-spacingVerticalL) var(--fluent-spacingHorizontalM);text-align:center;cursor:pointer;transition:background .15s;border-bottom:3px solid transparent}
.kpi:hover{background:var(--fluent-colorNeutralBackground2)}
.kpi:focus{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:-2px}
.kpi.active{border-bottom-color:var(--fluent-colorBrandBackground);background:var(--fluent-colorNeutralBackground2)}
.kpi .val{font-size:var(--fluent-fontSizeBase600);font-weight:700;line-height:1.2}
.kpi .lbl{font-size:11px;color:var(--fluent-colorNeutralForeground2);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--fluent-colorNeutralStroke1);flex-wrap:wrap;align-items:center}
.filter-input{padding:6px 12px;border:1px solid var(--fluent-colorNeutralStroke1);border-radius:var(--fluent-borderRadiusMedium);font-size:var(--fluent-fontSizeBase300);font-family:inherit;background:var(--fluent-colorNeutralBackground1);color:var(--fluent-colorNeutralForeground1);min-width:200px}
.filter-input:focus{outline:none;border-color:var(--fluent-colorBrandBackground);box-shadow:0 0 0 2px rgba(15,108,189,.12)}
.timeline{padding:20px;display:flex;flex-direction:column;gap:0;position:relative}
.timeline::before{content:'';position:absolute;left:30px;top:20px;bottom:20px;width:2px;background:var(--fluent-colorNeutralStroke1)}
.tl-item{display:flex;gap:16px;padding:8px 0;position:relative}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--fluent-colorBrandBackground);margin-top:4px;flex-shrink:0;z-index:1;margin-left:24px}
.tl-dot.tool-call{background:var(--fluent-colorBrandBackground)}.tl-dot.routing{background:#8764b8}.tl-dot.approval{background:var(--fluent-colorPaletteGreenBackground3)}.tl-dot.escalation{background:var(--fluent-colorPaletteRedBackground3)}
.tl-content{flex:1;background:var(--fluent-colorNeutralBackground2);border-radius:var(--fluent-borderRadiusMedium);padding:10px 14px}
.tl-content:focus{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:1px}
.tl-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.tl-type{font-size:11px;font-weight:var(--fluent-fontWeightSemibold);text-transform:uppercase;letter-spacing:.3px}
.tl-time{font-size:11px;color:var(--fluent-colorNeutralForeground3)}
.tl-body{font-size:13px;margin-top:4px;color:var(--fluent-colorNeutralForeground2)}
.tl-meta{font-size:11px;color:var(--fluent-colorNeutralForeground3);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.badge{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:var(--fluent-fontWeightSemibold)}
.badge-tc{background:#e0edff;color:var(--fluent-colorBrandForeground1)}.badge-rt{background:#f0e6ff;color:#8764b8}
.badge-ap{background:#e6f4e6;color:var(--fluent-colorPaletteGreenForeground1)}.badge-es{background:#fde7e9;color:var(--fluent-colorPaletteRedForeground1)}
.table-wrap{overflow-x:auto;display:none}
table{width:100%;border-collapse:collapse;font-size:var(--fluent-fontSizeBase300)}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:var(--fluent-fontWeightSemibold);text-transform:uppercase;letter-spacing:.3px;color:var(--fluent-colorNeutralForeground2);background:var(--fluent-colorNeutralBackground2);border-bottom:1px solid var(--fluent-colorNeutralStroke1);position:sticky;top:0}
td{padding:10px 14px;border-bottom:1px solid var(--fluent-colorNeutralStroke1);vertical-align:top}
tr:hover td{background:var(--fluent-colorNeutralBackground2)}
.mono{font-family:'Consolas','Courier New',monospace;font-size:12px}
.empty{text-align:center;color:var(--fluent-colorNeutralForeground3);padding:48px 20px;font-size:var(--fluent-fontSizeBase300)}
.view-toggle{display:flex;gap:0;margin-left:auto}
.view-btn{padding:6px 14px;border:1px solid var(--fluent-colorNeutralStroke1);font-size:12px;font-weight:var(--fluent-fontWeightSemibold);cursor:pointer;background:var(--fluent-colorNeutralBackground1);color:var(--fluent-colorNeutralForeground2);font-family:inherit;transition:all .15s}
.view-btn:first-child{border-radius:var(--fluent-borderRadiusMedium) 0 0 var(--fluent-borderRadiusMedium)}
.view-btn:last-child{border-radius:0 var(--fluent-borderRadiusMedium) var(--fluent-borderRadiusMedium) 0;border-left:0}
.view-btn.active{background:var(--fluent-colorBrandBackground);color:#fff;border-color:var(--fluent-colorBrandBackground)}
.view-btn:focus{outline:2px solid var(--fluent-colorBrandBackground);outline-offset:1px}
.footer{padding:10px 16px;border-top:1px solid var(--fluent-colorNeutralStroke1);text-align:right;font-size:10px;color:var(--fluent-colorNeutralForeground3)}
</style>
</head>
<body>
<div class="widget" role="region" aria-label="Compliance Audit Trail">
  <div class="widget-header"><div class="widget-icon">📜</div><div class="widget-title"><h2>Compliance Audit Trail</h2><p>Event Log &amp; Timeline</p></div></div>
  <div class="kpis" id="kpis" role="tablist" aria-label="Audit event summary"></div>
  <div class="toolbar" role="toolbar" aria-label="Filters">
    <input class="filter-input" id="search" type="search" placeholder="Filter events..." aria-label="Filter audit events" oninput="applyFilter()">
    <div class="view-toggle"><button class="view-btn active" id="btn-timeline" onclick="setView('timeline')" aria-label="Timeline view">Timeline</button><button class="view-btn" id="btn-table" onclick="setView('table')" aria-label="Table view">Table</button></div>
  </div>
  <div class="timeline" id="timeline" role="log" aria-label="Audit event timeline" aria-live="polite"></div>
  <div class="table-wrap" id="table-wrap"><table role="grid" aria-label="Audit event table"><thead><tr><th scope="col">Timestamp</th><th scope="col">Type</th><th scope="col">Worker</th><th scope="col">Tool</th><th scope="col">Parameters</th><th scope="col">Duration</th></tr></thead><tbody id="tbody"></tbody></table></div>
  <div class="empty" id="empty" style="display:none" role="status">No audit events recorded.</div>
  <div class="footer" id="footer"></div>
</div>
<script>
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
var entries=to.entries||[];
var summary=to.summary||{};
var activeTypeFilter=null;
var currentView='timeline';

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function typeKey(t){var l=(t||'').toLowerCase().replace(/[^a-z]/g,'');if(l.indexOf('tool')>-1)return'tool-call';if(l.indexOf('rout')>-1)return'routing';if(l.indexOf('approv')>-1)return'approval';if(l.indexOf('escal')>-1)return'escalation';return l||'other';}
function typeBadge(t){var k=typeKey(t);var m={'tool-call':'badge-tc',routing:'badge-rt',approval:'badge-ap',escalation:'badge-es'};return'<span class="badge '+(m[k]||'badge-tc')+'">'+esc(t||'Event')+'</span>';}
function dotClass(t){return typeKey(t).replace('-','_').replace(' ','_');}

var typeCounts={};
for(var i=0;i<entries.length;i++){var tk=typeKey(entries[i].type);typeCounts[tk]=(typeCounts[tk]||0)+1;}

function buildKpis(){
  var el=document.getElementById('kpis');
  var items=[
    {val:entries.length,lbl:'Total Events',filter:null},
    {val:typeCounts['tool-call']||0,lbl:'Tool Calls',filter:'tool-call'},
    {val:typeCounts['routing']||0,lbl:'Routing',filter:'routing'},
    {val:typeCounts['approval']||0,lbl:'Approvals',filter:'approval'},
    {val:typeCounts['escalation']||0,lbl:'Escalations',filter:'escalation'}
  ];
  var html='';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    html+='<div class="kpi'+(activeTypeFilter===it.filter?' active':'')+'" role="tab" tabindex="0" aria-selected="'+(activeTypeFilter===it.filter)+'" onclick="filterType('+(it.filter?"\'"+it.filter+"\'":"null")+')" onkeydown="if(event.key===\'Enter\')this.click()"><div class="val">'+it.val+'</div><div class="lbl">'+it.lbl+'</div></div>';
  }
  el.innerHTML=html;
}

function sanitizeParams(p){if(!p)return'—';if(typeof p==='string')return p.length>80?p.substring(0,80)+'…':p;try{var s=JSON.stringify(p);return s.length>80?s.substring(0,80)+'…':s;}catch(e){return'—';}}

function getFiltered(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  return entries.filter(function(e){
    if(activeTypeFilter&&typeKey(e.type)!==activeTypeFilter)return false;
    if(q){var blob=JSON.stringify(e).toLowerCase();return blob.indexOf(q)>-1;}
    return true;
  });
}

function renderTimeline(){
  var filtered=getFiltered();
  var el=document.getElementById('timeline');
  var emptyEl=document.getElementById('empty');
  if(filtered.length===0){el.innerHTML='';emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  var html='';
  for(var i=0;i<filtered.length;i++){
    var e=filtered[i];var dk=typeKey(e.type).replace('-','_');
    html+='<div class="tl-item"><div class="tl-dot '+dk+'"></div><div class="tl-content" tabindex="0"><div class="tl-header">'+typeBadge(e.type)+'<span class="tl-time">'+esc(e.timestamp||'')+'</span></div><div class="tl-body">'+esc(e.worker||'')+(e.tool?' → <strong>'+esc(e.tool)+'</strong>':'')+'</div><div class="tl-meta"><span>Params: <span class="mono">'+esc(sanitizeParams(e.parameters||e.params))+'</span></span>'+(e.duration?'<span>Duration: '+esc(e.duration)+'</span>':'')+'</div></div></div>';
  }
  el.innerHTML=html;
}

function renderTable(){
  var filtered=getFiltered();
  var tbody=document.getElementById('tbody');
  var emptyEl=document.getElementById('empty');
  if(filtered.length===0){tbody.innerHTML='';emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  var html='';
  for(var i=0;i<filtered.length;i++){
    var e=filtered[i];
    html+='<tr tabindex="0"><td class="mono">'+esc(e.timestamp||'')+'</td><td>'+typeBadge(e.type)+'</td><td>'+esc(e.worker||'')+'</td><td>'+esc(e.tool||'—')+'</td><td class="mono">'+esc(sanitizeParams(e.parameters||e.params))+'</td><td>'+esc(e.duration||'—')+'</td></tr>';
  }
  tbody.innerHTML=html;
}

function render(){if(currentView==='timeline')renderTimeline();else renderTable();}

function filterType(f){activeTypeFilter=activeTypeFilter===f?null:f;buildKpis();render();}
function applyFilter(){render();}

function setView(v){
  currentView=v;
  document.getElementById('timeline').style.display=v==='timeline'?'flex':'none';
  document.getElementById('table-wrap').style.display=v==='table'?'block':'none';
  document.getElementById('btn-timeline').className='view-btn'+(v==='timeline'?' active':'');
  document.getElementById('btn-table').className='view-btn'+(v==='table'?' active':'');
  render();
}

buildKpis();render();
document.getElementById('footer').textContent='Audit Trail · '+entries.length+' event'+(entries.length!==1?'s':'')+' · '+new Date().toLocaleString();
</script>
</body>
</html>
